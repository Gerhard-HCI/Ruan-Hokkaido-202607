Object.assign(I18N,{"toros_today": {"es": "Los toros de hoy", "de": "Die Stiere von heute", "en": "Today's bulls", "ru": "Сегодняшние быки", "ja": "本日の牛"}, "toros_sub": {"es": "Reseña oficial", "de": "Offizielle Reseña", "en": "Official reseña", "ru": "Официальная резенья", "ja": "公式リスト"}, "t_divisa": {"es": "Divisa", "de": "Divise", "en": "Colours", "ru": "Дивиса", "ja": "標章"}, "t_senal": {"es": "Señal", "de": "Ohrmarke", "en": "Ear mark", "ru": "Метка на ушах", "ja": "耳標"}, "t_antig": {"es": "Antigüedad", "de": "Registriert seit", "en": "Seniority", "ru": "Старшинство с", "ja": "由緒"}, "t_finca": {"es": "Finca", "de": "Gut", "en": "Estate", "ru": "Поместье", "ja": "牧場"}, "t_mayoral": {"es": "Mayoral", "de": "Mayoral", "en": "Herdsman", "ru": "Старший пастух", "ja": "牧夫長"}, "t_pres": {"es": "Presidente", "de": "Präsident", "en": "President", "ru": "Президент", "ja": "議長"}, "t_asesor": {"es": "Asesor", "de": "Berater", "en": "Advisor", "ru": "Советник", "ja": "顧問"}, "t_vet": {"es": "Veterinario", "de": "Tierarzt", "en": "Vet", "ru": "Ветеринар", "ja": "獣医"}, "th_born": {"es": "Nac.", "de": "Geb.", "en": "Born", "ru": "Рожд.", "ja": "生年"}, "th_weight": {"es": "Peso", "de": "Gewicht", "en": "Weight", "ru": "Вес", "ja": "体重"}, "toros_sob": {"es": "Sobreros · misma ganadería", "de": "Ersatzstiere · gleiche Zucht", "en": "Reserve bulls · same ranch", "ru": "Запасные быки · то же хозяйство", "ja": "予備の牛 · 同牧場"}});
Object.assign(I18N,{"rev_title": {"es": "La crítica", "de": "Die Kritik", "en": "The reviews", "ru": "Отзывы критики", "ja": "批評"}, "rev_sub": {"es": "Resumen de la prensa taurina", "de": "Pressestimmen", "en": "Bullfighting press round-up", "ru": "Обзор корридной прессы", "ja": "闘牛紙評まとめ"}, "rev_verdict": {"es": "Balance", "de": "Fazit", "en": "Verdict", "ru": "Итог", "ja": "総括"}, "rev_summary": {"es": "Corrida seria y bien presentada de Cebada Gago, pero justa de fuerza. Tarde digna más que memorable: nobleza y algunas embestidas de calidad, poco fuego. Plaza llena. <b>David Galván<\/b> y <b>Manuel Diosleguarde<\/b> cortaron una oreja cada uno; <b>Román<\/b>, con el lote más ingrato, se fue de vacío.", "de": "Ernste, gut präsentierte Corrida von Cebada Gago, aber knapp an Kraft. Ein würdiger, kein denkwürdiger Nachmittag: Adel und einige Angriffe von Qualität, wenig Feuer. Volle Arena. <b>David Galván<\/b> und <b>Manuel Diosleguarde<\/b> schnitten je ein Ohr; <b>Román<\/b> ging mit dem undankbarsten Los leer aus.", "en": "A serious, well-presented Cebada Gago corrida, but short of strength. A respectable rather than memorable afternoon: nobility and some quality charges, little fire. Full house. <b>David Galván<\/b> and <b>Manuel Diosleguarde<\/b> each cut an ear; <b>Román<\/b>, with the least grateful lot, went empty-handed.", "ru": "Серьёзная, хорошо представленная коррида Себада-Гаго, но быкам не хватило сил. Достойный, но не памятный вечер: благородство и несколько качественных атак, мало огня. Полная арена. <b>Давид Гальван<\/b> и <b>Мануэль Диослегуарде<\/b> отрезали по уху; <b>Роман<\/b> с самым неблагодарным жребием остался ни с чем.", "ja": "堂々として見栄えのよいセバダ・ガゴの一戦でしたが、牛の力は不足気味。記憶に残るというより立派な午後——気品といくつかの質の高い突進はあったが、熱狂は乏しい。満員。<b>ダビ・ガルバン<\/b>と<b>マヌエル・ディオスレグアルデ<\/b>が耳1枚ずつ、最も恵まれない組み合わせの<b>ロマン<\/b>は無冠に終わりました。"}, "rev_o1": {"es": "El más equilibrado: toros nobles y manejables, pero cortos de energía. Galván tuvo el mejor lote y se quedó en media intensidad; el sexto de Diosleguarde fue el más celebrado por su temple y longitud. Román cargó con lo peor, sobre todo un segundo áspero.", "de": "Der ausgewogenste: edle, handhabbare Stiere, aber energiearm. Galván hatte das beste Los, blieb aber auf mittlerer Intensität; der sechste von Diosleguarde kam wegen Temple und Länge am besten an. Román erwischte das Schlechteste, vor allem einen rauen zweiten.", "en": "The most balanced take: noble, manageable bulls but short of energy. Galván had the best lot yet stayed at medium intensity; Diosleguarde's sixth was best received for its temple and length. Román drew the worst, above all a rough second.", "ru": "Самый взвешенный разбор: быки благородные и послушные, но без энергии. У Гальвана был лучший жребий, однако он остался на средней интенсивности; шестой у Диослегуарде приняли лучше всех за темп и протяжённость. Роману достался худший, особенно грубый второй.", "ja": "最も均衡のとれた評。牛は気高く扱いやすいが精力不足。ガルバンは最良の組みながら中程度の強度にとどまり、ディオスレグアルデの6番目がテンプレと長さで最も好評。ロマンは最悪の組み、とりわけ荒い2番目を引きました。"}, "rev_o2": {"es": "Más severos: tarde «compleja». Los Cebadas, bien presentados pero sin empuje. Las orejas, para Galván y Diosleguarde; el lote de Román ayudó muy poco.", "de": "Strenger: ein „komplexer“ Nachmittag. Die Cebadas gut präsentiert, aber ohne Schub. Die Ohren für Galván und Diosleguarde; Románs Los half sehr wenig.", "en": "More severe: a “complex” afternoon. The Cebadas were well presented but lacked push. The ears went to Galván and Diosleguarde; Román's lot helped very little.", "ru": "Строже: «сложный» вечер. Себады хорошо представлены, но без напора. Уши — Гальвану и Диослегуарде; жребий Романа помог очень мало.", "ja": "より厳しい評価。「複雑な」午後で、セバダは見栄えはよいが推進力を欠く。耳はガルバンとディオスレグアルデへ。ロマンの組みはほとんど助けにならなかった。"}, "rev_o3": {"es": "Tono local y cálido: «Una buena primera impresión». Subrayan que Galván y Diosleguarde cortaron oreja en su presentación en la Feria del Toro, aunque señalan el calor, la fuerza justa y que la oreja de Diosleguarde llegó sobre todo por actitud y una buena espada.", "de": "Lokaler, warmer Ton: „Una buena primera impresión“. Sie heben hervor, dass Galván und Diosleguarde bei ihrer Vorstellung in der Feria del Toro je ein Ohr schnitten, verweisen aber auf Hitze, knappe Kraft und dass Diosleguardes Ohr vor allem durch Haltung und ein gutes Schwert kam.", "en": "A warmer, local tone: “Una buena primera impresión”. They stress that Galván and Diosleguarde cut ears on their Feria del Toro debut, while noting the heat, the limited strength, and that Diosleguarde's ear owed much to attitude and a strong sword.", "ru": "Тёплый местный тон: «Una buena primera impresión». Подчёркивают, что Гальван и Диослегуарде отрезали по уху в дебюте на Ферия-дель-Торо, отмечая жару, скромные силы быков и что ухо Диослегуарде добыто прежде всего характером и удачной шпагой.", "ja": "地元らしい温かい論調で「よき第一印象」。ガルバンとディオスレグアルデがフェリア・デル・トロ初登場で耳を切ったことを強調しつつ、暑さ、牛の力不足、そしてディオスレグアルデの耳は主に姿勢と見事な剣によるものだと指摘します。"}, "rev_o4": {"es": "Más positivos: corrida «interesante» de Cebada Gago, muy bien presentada y de buen juego general, aunque sin un toro completo. Destacan el sexto de Diosleguarde como cumbre emocional y sus naturales como los mejores muletazos de la tarde.", "de": "Positiver: eine „interessante“ Cebada-Gago-Corrida, sehr gut präsentiert und insgesamt gut im Spiel, wenn auch ohne einen kompletten Stier. Sie heben den sechsten von Diosleguarde als emotionalen Höhepunkt hervor und seine Naturales als beste Muletazos des Nachmittags.", "en": "More positive: an “interesting” Cebada Gago corrida, very well presented and of good overall game, though without a complete bull. They single out Diosleguarde's sixth as the emotional peak and his naturales as the afternoon's best muletazos.", "ru": "Позитивнее: «интересная» коррида Себада-Гаго, отлично представленная, с хорошей игрой в целом, хотя без цельного быка. Выделяют шестого у Диослегуарде как эмоциональную вершину, а его натуралес — как лучшие мулетасо вечера.", "ja": "より肯定的。「興味深い」セバダ・ガゴの一戦で、見栄えがよく全体に良い動き。ただし完全な牛はいなかった。ディオスレグアルデの6番目を感動の頂点とし、そのナトゥラルを当日最良のムレタ捌きと評します。"}, "rev_o5": {"es": "También positivos: corrida seria, de juego variado, con toros nobles y con calidad, aunque varios limitados físicamente. Puntúan especialmente bien el cuarto de Galván y el sexto de Diosleguarde.", "de": "Ebenfalls positiv: ernste Corrida mit abwechslungsreichem Spiel, edlen Stieren von Qualität, wenn auch mehrere körperlich limitiert. Besonders gut bewerten sie Galváns vierten und Diosleguardes sechsten.", "en": "Also positive: a serious corrida of varied game, with noble bulls of quality, though several physically limited. They rate Galván's fourth and Diosleguarde's sixth especially well.", "ru": "Тоже позитивно: серьёзная коррида с разнообразной игрой, благородные быки с качеством, хотя некоторые физически ограничены. Особенно высоко оценивают четвёртого у Гальвана и шестого у Диослегуарде.", "ja": "こちらも肯定的。堂々とした一戦で動きは多彩、牛は気高く質もあるが、数頭は体力面で限界。ガルバンの4番目とディオスレグアルデの6番目を特に高く評価します。"}, "rev_take_lbl": {"es": "Lectura de la Peña", "de": "Lesart der Peña", "en": "The Peña's read", "ru": "Взгляд Пеньи", "ja": "ペーニャの見立て"}, "rev_take": {"es": "Tarde respetable de Pamplona, no una guerra memorable de Cebada Gago. Presentación seria, algunas embestidas nobles, poco fuego. Galván, eficaz; Diosleguarde dejó la mejor impresión; Román, sin suerte y poco certero con la espada.", "de": "Ein respektabler Pamplona-Nachmittag, kein denkwürdiger Cebada-Gago-Krieg. Ernste Präsentation, einige edle Angriffe, wenig Feuer. Galván effizient; Diosleguarde hinterließ den besten Eindruck; Román glücklos und mit dem Schwert zu ungenau.", "en": "A respectable Pamplona afternoon, not a memorable Cebada Gago war. Serious presentation, some noble charges, little fire. Galván efficient; Diosleguarde made the better impression; Román unlucky and not sharp enough with the sword.", "ru": "Достойный памплонский вечер, но не памятная война Себада-Гаго. Серьёзная презентация, несколько благородных атак, мало огня. Гальван деловит; Диослегуарде оставил лучшее впечатление; Роман неудачлив и неточен со шпагой.", "ja": "立派なパンプローナの午後ではあるが、記憶に残るセバダ・ガゴの死闘ではない。堂々たる見栄え、いくつかの気高い突進、しかし熱狂は乏しい。ガルバンは手堅く、ディオスレグアルデがより良い印象を残し、ロマンは不運で剣も冴えなかった。"}});
Object.assign(I18N,{"rev9_summary": {"es": "Triunfo ruidoso sobre el papel, pero la crítica se parte en dos: emoción de Puerta Grande frente a trofeos muy baratos. Toros bien presentados y deslucidos en conjunto. <b>Roca Rey<\/b>: dos orejas y silencio. <b>David de Miranda<\/b>: silencio y dos orejas. <b>Talavante<\/b>: silencio tras aviso y ovación. Roca Rey y De Miranda salieron a hombros.", "de": "Auf dem Papier ein lautstarker Triumph, doch die Kritik spaltet sich: Puerta-Grande-Emotion gegen sehr billige Trophäen. Stiere gut präsentiert, insgesamt glanzlos. <b>Roca Rey<\/b>: zwei Ohren und Schweigen. <b>David de Miranda<\/b>: Schweigen und zwei Ohren. <b>Talavante<\/b>: Schweigen nach Aviso und Ovation. Roca Rey und De Miranda wurden auf den Schultern hinausgetragen.", "en": "A noisy triumph on paper, but the critics split in two: Puerta Grande emotion against very cheap trophies. Bulls well presented, lacklustre overall. <b>Roca Rey<\/b>: two ears and silence. <b>David de Miranda<\/b>: silence and two ears. <b>Talavante<\/b>: silence after an aviso, and an ovation. Roca Rey and De Miranda left on shoulders.", "ru": "На бумаге шумный триумф, но критика раскололась надвое: эмоции Пуэрта-Гранде против очень дешёвых трофеев. Быки хорошо представлены, в целом невыразительны. <b>Рока Рей<\/b>: два уха и молчание. <b>Давид де Миранда<\/b>: молчание и два уха. <b>Талаванте<\/b>: молчание после ависо и овация. Рока Рей и де Миранда вышли на плечах.", "ja": "数字の上では大成功ですが、批評は真っ二つ——「大門凱旋の感動」対「あまりに安い賞」。牛は見栄えはよいが全体に精彩を欠きました。<b>ロカ・レイ<\/b>：耳2枚と沈黙。<b>ダビ・デ・ミランダ<\/b>：沈黙と耳2枚。<b>タラバンテ<\/b>：勧告後の沈黙と拍手。ロカ・レイとデ・ミランダは肩車で退場しました。"}, "rev9_o1": {"es": "Durísimo. Titula «orejas de plaza portátil»: ambas segundas orejas fueron excesivas y la presidencia se dejó llevar por el ambiente festivo, pesando más el humor de la plaza que la calidad real del toreo. Reconoce méritos en el segundo de Roca Rey —saltilleras, inicio de rodillas, gran estocada— pero no para dos orejas. Más severo aún con el sexto de De Miranda: alegre pero sin clase, muchos medios pases, remate populista en corto y espada baja.", "de": "Sehr hart. Überschrift: „orejas de plaza portátil“. Beide zweiten Ohren seien übertrieben gewesen, die Präsidentschaft habe sich von der Festatmosphäre mitreißen lassen; die Stimmung der Arena wog schwerer als die wirkliche Qualität des Toreo. Er erkennt Verdienste beim zweiten Stier Roca Reys an — Saltilleras, Beginn auf den Knien, großer Degenstoß —, aber nicht für zwei Ohren. Noch strenger beim sechsten De Mirandas: munter, doch ohne Klasse, viele halbe Pässe, populistischer Schluss auf kurze Distanz und tiefer Degen.", "en": "Brutal. Headline: “orejas de plaza portátil”. Both second ears were excessive, he argues, and the presidency was carried away by the festive atmosphere — the plaza's mood counted for more than the real quality of the toreo. He grants merit in Roca Rey's second bull — saltilleras, a kneeling start, a big sword — but not enough for two ears. Harsher still on De Miranda's sixth: lively but without class, many half-passes, a populist close-range finish and a low sword.", "ru": "Беспощадно. Заголовок: «orejas de plaza portátil». Оба вторых уха, по его мнению, чрезмерны, а президиум поддался праздничной атмосфере: настроение арены значило больше, чем подлинное качество торео. Он признаёт достоинства второго быка Рока Рея — сальтильеры, начало с колен, отличная шпага, — но не на два уха. Ещё строже к шестому у де Миранды: живо, но без класса, много полупассов, популистская концовка вблизи и низкая шпага.", "ja": "痛烈。見出しは「orejas de plaza portátil（移動闘牛場の耳）」。2枚目の耳はいずれも過大で、議長が祝祭の空気に流された——闘技の実質より観客の気分が重んじられた、と。ロカ・レイの2頭目にはサルティリェーラ、跪いての開始、見事な剣という功を認めつつ、耳2枚には足りないとします。デ・ミランダの6頭目にはさらに厳しく、陽気だが品位を欠き、半端なパスが多く、近距離の大衆迎合的な締めと剣は低かったと評します。"}, "rev9_o2": {"es": "Mucho más positivo: «Roca Rey recupera el trono de Pamplona y De Miranda lo quiere». Elogian la autoridad y la profundidad de Roca Rey con el segundo, y sobre todo la ambición y la valentía de De Miranda con el sexto, en una faena que fue creciendo en poder y entrega antes de una excelente estocada. Aun así, ven los toros bien presentados pero deslucidos en conjunto.", "de": "Deutlich positiver: „Roca Rey recupera el trono de Pamplona y De Miranda lo quiere“. Gelobt werden Autorität und Tiefe Roca Reys beim zweiten Stier und vor allem Ehrgeiz und Mut De Mirandas beim sechsten — eine Faena, die an Kraft und Hingabe wuchs, vor einem ausgezeichneten Degenstoß. Dennoch: gut präsentierte, insgesamt glanzlose Stiere.", "en": "Far more positive: “Roca Rey recupera el trono de Pamplona y De Miranda lo quiere”. They praise Roca Rey's authority and depth with the second, and above all De Miranda's ambition and bravery with the sixth — a faena that grew in power and commitment before an excellent sword. Even so, they find the bulls well presented but lacklustre overall.", "ru": "Гораздо позитивнее: «Roca Rey recupera el trono de Pamplona y De Miranda lo quiere». Хвалят властность и глубину Рока Рея со вторым и особенно честолюбие и смелость де Миранды с шестым — фаэна нарастала в силе и самоотдаче перед отличной шпагой. И всё же быки, по их мнению, хорошо представлены, но в целом невыразительны.", "ja": "はるかに好意的。見出しは「Roca Rey recupera el trono de Pamplona y De Miranda lo quiere」。ロカ・レイの2頭目での威厳と深み、とりわけデ・ミランダの6頭目での野心と勇気を称え、力と献身を増していったファエナの末に見事な剣が決まったとします。それでも牛は見栄えはよいが全体に精彩を欠くと見ています。"}, "rev9_o3": {"es": "En el medio. Aceptan la Puerta Grande, pero apuntan que las dos orejas de Roca Rey sorprendieron a parte del público. Consideran el sexto de De Miranda la actuación más sólida de la tarde, ante un toro manso pero manejable. Talavante tuvo pasajes, pero perdió todo premio con la espada.", "de": "Dazwischen. Sie akzeptieren die Puerta Grande, merken aber an, dass Roca Reys zwei Ohren einen Teil des Publikums überraschten. Den sechsten De Mirandas halten sie für die solideste Leistung des Nachmittags, vor einem zwar mansen, doch handhabbaren Stier. Talavante hatte Passagen, verspielte jede Trophäe mit dem Degen.", "en": "In between. They accept the Puerta Grande but note that Roca Rey's two ears surprised part of the crowd. They call De Miranda's sixth the afternoon's most solid performance, against a manso but manageable bull. Talavante had passages but lost any prize with the sword.", "ru": "Посередине. Признают Пуэрта-Гранде, но отмечают, что два уха Рока Рея удивили часть публики. Шестого у де Миранды считают самым уверенным выступлением вечера — против трусоватого, но послушного быка. У Талаванте были удачные отрезки, но шпага лишила его наград.", "ja": "中間的。プエルタ・グランデは認めつつ、ロカ・レイの耳2枚は観客の一部を驚かせたと指摘。デ・ミランダの6頭目を当日最も堅実な演技とし、相手は臆病だが扱いやすい牛だったとします。タラバンテには見せ場もあったが、剣で賞を逃しました。"}, "rev9_o4": {"es": "Lee la tarde como teatro clásico de Pamplona. Su crónica en directo muestra una plaza volcada: las dos orejas de Roca Rey llegaron tras una gran estocada y petición; el sexto de De Miranda fue tomando vuelo cuando el público entró en la faena, aunque el toro ya venía a menos.", "de": "Liest den Nachmittag als klassisches Pamplona-Theater. Die Live-Chronik zeigt eine völlig mitgehende Arena: Roca Reys zwei Ohren kamen nach großem Degenstoß und Publikumsforderung; De Mirandas sechster gewann an Schwung, sobald das Publikum in die Faena einstieg — obwohl der Stier schon nachließ.", "en": "Reads the afternoon as classic Pamplona theatre. Its live chronicle shows a plaza fully involved: Roca Rey's two ears came after a big sword and a petition; De Miranda's sixth gathered momentum once the public entered the faena, even though the bull was already coming down.", "ru": "Читает вечер как классический памплонский театр. Прямая хроника показывает вовлечённую арену: два уха Рока Рея пришли после отличной шпаги и требования публики; шестой у де Миранды набрал ход, когда зрители включились в фаэну, хотя бык уже сдавал.", "ja": "この午後をパンプローナ的な古典劇として描きます。実況記事には一体となった観客の姿——ロカ・レイの耳2枚は見事な剣と観客の要求の後に。デ・ミランダの6頭目は、牛の力が落ちてきていたにもかかわらず、観客がファエナに加わると勢いを増していきました。"}, "rev9_take": {"es": "Más triunfalista que realmente importante. Roca Rey reconectó con Pamplona y De Miranda aprovechó muy bien la ocasión, pero los críticos serios tienen razón: probablemente fueron dos Puertas Grandes infladas por el ambiente de San Fermín, no una gran corrida de Victoriano del Río.", "de": "Mehr triumphalistisch als wirklich bedeutend. Roca Rey fand wieder zu Pamplona, und De Miranda nutzte die Gelegenheit hervorragend; doch die ernsten Kritiker haben recht: wohl zwei von der San-Fermín-Stimmung aufgeblähte Puertas Grandes, keine große Victoriano-del-Río-Corrida.", "en": "More triumphalist than truly important. Roca Rey reconnected with Pamplona and De Miranda used the opportunity very well, but the serious critics are right: this was probably two Puertas Grandes inflated by San Fermín atmosphere, not a great Victoriano del Río corrida.", "ru": "Больше триумфализма, чем подлинной значимости. Рока Рей вновь нашёл общий язык с Памплоной, а де Миранда прекрасно использовал шанс, но серьёзные критики правы: это, вероятно, две Пуэрта-Гранде, раздутые атмосферой Сан-Фермина, а не великая коррида Викториано-дель-Рио.", "ja": "実質より祝勝気分が勝った一日。ロカ・レイはパンプローナとの絆を取り戻し、デ・ミランダも好機を存分に生かしました。しかし厳しい批評家の言う通り、これはおそらくサンフェルミンの熱気が膨らませた2つの大門凱旋であって、偉大なビクトリアノ・デル・リオの一戦ではありません。"}});
Object.assign(I18N,{"t_sobgan": {"es": "otra ganadería", "de": "andere Zucht", "en": "different ranch", "ru": "другое хозяйство", "ja": "別牧場"}});
Object.assign(I18N,{"rev10_summary": {"es": "Enorme expectación y varios pasajes refinados —sobre todo de Morante—, pero poca emoción sostenida. La crítica reparte culpas entre una corrida desigual y unos matadores que no exprimieron los toros con opciones. Plaza llena (~19.700). Sin orejas. <b>Morante<\/b>: ovación y ovación. <b>Borja Jiménez<\/b>: silencio tras aviso y silencio. <b>Pablo Aguado<\/b>: ovación y silencio tras aviso.", "de": "Enorme Erwartung und einige feine Passagen — vor allem von Morante —, aber wenig anhaltende Emotion. Die Kritik verteilt die Schuld auf eine uneinheitliche Corrida und Matadore, die die Stiere mit Möglichkeiten nicht ausschöpften. Volle Arena (~19.700). Keine Ohren. <b>Morante<\/b>: Ovation und Ovation. <b>Borja Jiménez<\/b>: Schweigen nach Aviso und Schweigen. <b>Pablo Aguado<\/b>: Ovation und Schweigen nach Aviso.", "en": "Huge expectation and several refined passages — above all from Morante — but little sustained emotion. Critics split the blame between an uneven corrida and matadors who failed to exploit the bulls that offered possibilities. Full house (~19,700). No ears. <b>Morante<\/b>: ovation and ovation. <b>Borja Jiménez<\/b>: silence after an aviso, and silence. <b>Pablo Aguado<\/b>: ovation and silence after an aviso.", "ru": "Огромные ожидания и несколько утончённых отрезков — прежде всего у Моранте, — но мало устойчивой эмоции. Критика делит вину между неровной корридой и матадорами, не выжавшими быков с возможностями. Полная арена (~19 700). Без ушей. <b>Моранте<\/b>: овация и овация. <b>Борха Хименес<\/b>: молчание после ависо и молчание. <b>Пабло Агуадо<\/b>: овация и молчание после ависо.", "ja": "大きな期待と、とりわけモランテによる洗練された場面がいくつか。しかし持続する感動には乏しい一日。批評はムラのある一戦と、可能性のある牛を生かせなかった闘牛士の双方に責を分けます。満員（約19,700人）。耳なし。<b>モランテ<\/b>：拍手と拍手。<b>ボルハ・ヒメネス<\/b>：勧告後の沈黙と沈黙。<b>パブロ・アグアド<\/b>：拍手と勧告後の沈黙。"}, "rev10_o1": {"es": "Da a Morante la victoria más clara, aunque sin trofeos: calma, inteligencia y temple con los dos toros menos boyantes. El primero dejó varios muletazos de calidad tras unas chicuelinas magistrales; con el cuarto, excelentes verónicas y una docena de naturales de mérito, aunque sin continuidad, y la espada baja estropeó el remate. Mucho más duro con Borja Jiménez, que llevó el mejor lote: fue demasiado deprisa, no rebajó la velocidad y firmó dos faenas atropelladas y poco templadas; los fallos con la espada borraron cualquier premio. Aguado dejó una gran serie de naturales al primero, pero sin continuidad ni entrega.", "de": "Er gibt Morante den klarsten Sieg, wenn auch ohne Trophäen: Ruhe, Intelligenz und Temple mit den beiden wenig gängigen Stieren. Der erste erlaubte mehrere Muletazos von Qualität nach meisterhaften Chicuelinas; beim vierten ausgezeichnete Verónicas und ein Dutzend beachtlicher Naturales, jedoch ohne Kontinuität, und der tiefe Degen verdarb den Schluss. Viel härter mit Borja Jiménez, der das beste Los hatte: zu schnell, ohne das Tempo zu drosseln, zwei überhastete, wenig getemperte Faenas; die Degenfehler löschten jede Trophäe. Aguado hinterließ eine große Naturales-Serie beim ersten, aber ohne Kontinuität und Hingabe.", "en": "Gives Morante the clearest win, though without trophies: calm, intelligence and temple with the two least promising bulls. His first allowed several quality muletazos after masterful chicuelinas; with the fourth, excellent verónicas and around a dozen notable naturales, though without continuity, and the low sword spoiled the finish. Much harder on Borja Jiménez, who drew the best lot: he worked too fast, never reduced the bulls' speed and produced two crowded, under-tempered faenas; repeated sword failures erased any prize. Aguado left one great series of naturales to his first, but otherwise lacked continuity and commitment.", "ru": "Отдаёт Моранте самую явную победу, хотя и без трофеев: спокойствие, ум и темп с двумя наименее удобными быками. Первый позволил несколько качественных мулетасо после мастерских чикуэлин; с четвёртым — отличные вероники и около дюжины достойных натуралес, но без непрерывности, а низкая шпага испортила концовку. Гораздо строже к Борхе Хименесу, которому достался лучший жребий: спешил, не снижал скорость быков, выдал две сумбурные, недотемперированные фаэны; промахи со шпагой стёрли любую награду. Агуадо оставил отличную серию натуралес первому, но без непрерывности и самоотдачи.", "ja": "トロフィーはないものの、モランテに最も明確な勝利を与えます。御しにくい2頭に対する落ち着き、知性、テンプレ。1頭目は見事なチクエリーナの後に質の高いムレタ捌きをいくつか許し、4頭目には秀逸なベロニカと十数回の見事なナトゥラルがあったが連続性を欠き、低い剣が締めを損ないました。最良の組みを引いたボルハ・ヒメネスにははるかに厳しい評価——速く動きすぎ、牛の速度を落とさず、慌ただしくテンプレを欠く2つのファエナ。剣の失敗が賞の可能性を消しました。アグアドは1頭目に見事なナトゥラルの連続を残したが、連続性と献身を欠きました。"}, "rev10_o2": {"es": "Lo enmarca como una corrida a la que «le faltó la emoción esencial». Destaca el empuje de Jiménez y la torería de Aguado, pero sitúa los detalles de Morante como el centro artístico de la tarde: chicuelinas lentas, naturales y adornos a la antigua, aunque su cuarto casi no dio materia aprovechable.", "de": "Rahmt es als Corrida, der „die wesentliche Emotion fehlte“. Hebt Jiménez' Schub und Aguados Torería hervor, sieht aber Morantes Details als künstlerisches Zentrum des Nachmittags: langsame Chicuelinas, Naturales und Verzierungen alter Schule, obwohl sein vierter kaum verwertbares Material bot.", "en": "Frames it as a corrida in which “the essential emotion was missing.” It highlights Jiménez's drive and Aguado's torería, but places Morante's details as the artistic centre of the afternoon: slow chicuelinas, natural passes and old-fashioned flourishes, though his fourth gave almost no usable material.", "ru": "Подаёт это как корриду, в которой «недоставало главной эмоции». Отмечает напор Хименеса и торерию Агуадо, но помещает детали Моранте в художественный центр вечера: медленные чикуэлины, натуралес и украшения старой школы, хотя его четвёртый почти не дал пригодного материала.", "ja": "「本質的な感動が欠けた」一戦と位置づけます。ヒメネスの推進力とアグアドのトレリアを評価しつつ、モランテの細部を当日の芸術的中心とします——ゆったりしたチクエリーナ、ナトゥラル、古風な装飾。ただし彼の4頭目は使える素材をほとんど与えませんでした。"}, "rev10_o3": {"es": "Lo resume con nitidez: «Mucho toreo para tan poco toro». A su juicio, Borja Jiménez tuvo el toro de la tarde y Aguado firmó una serie de naturales especialmente buena, pero la corrida nunca llegó a ser la gran cita que prometía el cartel.", "de": "Fasst es treffend zusammen: „Mucho toreo para tan poco toro“. Aus seiner Sicht hatte Borja Jiménez den Stier des Nachmittags und Aguado eine besonders gute Naturales-Serie, doch die Corrida wurde nie zum großen Ereignis, das das Plakat versprach.", "en": "Sums it up neatly: “Mucho toreo para tan poco toro” — much torero, too little bull. In its view Borja Jiménez drew the bull of the afternoon and Aguado delivered one particularly fine natural series, but the corrida never became the major occasion the bill promised.", "ru": "Ёмко подытоживает: «Mucho toreo para tan poco toro» — много тореро, слишком мало быка. По его мнению, Борхе Хименесу достался бык вечера, а Агуадо выдал особенно хорошую серию натуралес, но коррида так и не стала большим событием, обещанным афишей.", "ja": "見事に要約します——「Mucho toreo para tan poco toro（技は豊かなれど牛は乏しい）」。ボルハ・ヒメネスが当日の牛を引き、アグアドが特に見事なナトゥラルの連続を披露したが、番組が約束した大舞台には至らなかった、と。"}, "rev10_o4": {"es": "Más severo con la ganadería: titula que la corrida de Álvaro Núñez «no pasó el examen». Las pinceladas aisladas de Morante se juzgan lo más valioso de una tarde decepcionante.", "de": "Strenger mit der Zucht: Überschrift, die Álvaro-Núñez-Corrida habe „die Prüfung nicht bestanden“. Morantes vereinzelte Pinselstriche gelten als das Wertvollste eines enttäuschenden Nachmittags.", "en": "Harder on the breeder: its headline says the Álvaro Núñez corrida “did not pass the examination.” Morante's isolated brushstrokes are judged the most valuable element of a disappointing afternoon.", "ru": "Строже к хозяйству: заголовок гласит, что коррида Альваро Нуньеса «не сдала экзамен». Отдельные мазки Моранте признаны самым ценным в разочаровывающем вечере.", "ja": "牧場にはより厳しく、見出しでアルバロ・ヌニェスの一戦は「試験に落第した」と。モランテの断片的な筆致が、期待外れの午後で最も価値あるものと評されます。"}, "rev10_take": {"es": "La tarde más interesante artísticamente de los tres días, pero la menos triunfal. Morante puso la clase de verdad y demostró que una faena puede importar sin oreja. Borja tuvo las mejores opciones pero las atropelló, Aguado ofreció belleza aislada, y los Álvaro Núñez no tuvieron la profundidad ni la casta para convertir la expectación en una gran corrida.", "de": "Der künstlerisch interessanteste, aber am wenigsten triumphale Nachmittag der drei Tage. Morante brachte die wahre Klasse und zeigte, dass eine Faena auch ohne Ohr zählen kann. Borja hatte die besten Chancen, überstürzte sie aber; Aguado bot vereinzelte Schönheit, und den Álvaro Núñez fehlten Tiefe und Casta, um die Erwartung in eine große Corrida zu verwandeln.", "en": "The most artistically interesting afternoon of the three days, but the least triumphant. Morante supplied the real class and showed a faena can matter without an ear. Borja had the better opportunities but hurried them, Aguado offered isolated beauty, and the Álvaro Núñez bulls lacked the depth and race to turn expectation into a great corrida.", "ru": "Самый интересный в художественном отношении вечер из трёх, но наименее триумфальный. Моранте дал подлинный класс и показал, что фаэна может быть значимой и без уха. У Борхи были лучшие возможности, но он их скомкал, Агуадо предложил отдельные красоты, а быкам Альваро Нуньеса не хватило глубины и касты, чтобы превратить ожидание в большую корриду.", "ja": "3日間で最も芸術的に興味深いが、最も栄光の乏しい午後。モランテは本物の品格を示し、耳がなくてもファエナが意味を持ちうることを証明しました。ボルハは最良の機会を得ながら急ぎすぎ、アグアドは断片的な美を見せ、アルバロ・ヌニェスの牛は期待を大きな一戦に変えるだけの深みとカスタを欠きました。"}});
Object.assign(I18N,{"rev11_summary": {"es": "Corrida de José Escolar imponente de presencia pero decepcionante: toros enormes, ofensivos y complicados, generalmente faltos de la bravura y el recorrido del encaste. Hubo tensión y mérito —sobre todo de Juan de Castilla—, pero poco toreo verdadero. La oreja de Fonseca dividió a la crítica. Plaza llena. <b>Ferrera<\/b>: silencio tras aviso y silencio tras aviso. <b>Juan de Castilla<\/b>: silencio y ovación. <b>Isaac Fonseca<\/b>: silencio y una oreja (al sexto, «Secretario»). De Castilla sufrió fractura del segundo metatarsiano del pie derecho tras ser volteado por el quinto.", "de": "Eine im Auftreten imposante, doch enttäuschende José-Escolar-Corrida: riesige, offensive, komplizierte Stiere, denen im Ganzen die Bravheit und der Lauf der Blutlinie fehlten. Es gab Spannung und Verdienst — vor allem von Juan de Castilla —, aber wenig echtes Toreo. Fonsecas Ohr spaltete die Kritik. Volle Arena. <b>Ferrera<\/b>: Schweigen nach Aviso und Schweigen nach Aviso. <b>Juan de Castilla<\/b>: Schweigen und Ovation. <b>Isaac Fonseca<\/b>: Schweigen und ein Ohr (am sechsten, „Secretario“). De Castilla erlitt einen Bruch des zweiten Mittelfußknochens im rechten Fuß, nachdem er vom fünften auf die Hörner genommen wurde.", "en": "A José Escolar corrida imposing in presence but disappointing: huge, offensive, complicated bulls generally lacking the bravery and sustained charge of the bloodline. There was tension and merit — above all from Juan de Castilla — but little true toreo. Fonseca's ear split the critics. Full house. <b>Ferrera<\/b>: silence after an aviso, and silence after an aviso. <b>Juan de Castilla<\/b>: silence and ovation. <b>Isaac Fonseca<\/b>: silence and one ear (from the sixth, “Secretario”). De Castilla suffered a fracture of the second metatarsal in his right foot after being tossed by the fifth.", "ru": "Коррида Хосе Эскольяра, внушительная видом, но разочаровывающая: огромные, агрессивные, сложные быки, которым в целом не хватило храбрости и хода линии. Были напряжение и достоинство — прежде всего у Хуана де Кастильи, — но мало подлинного торео. Ухо Фонсеки раскололо критику. Полная арена. <b>Феррера<\/b>: молчание после ависо и молчание после ависо. <b>Хуан де Кастилья<\/b>: молчание и овация. <b>Исаак Фонсека<\/b>: молчание и ухо (у шестого, «Secretario»). Де Кастилья получил перелом второй плюсневой кости правой стопы после того, как его подбросил пятый.", "ja": "風格は堂々たるも期待外れのホセ・エスコラルの一戦。巨大で攻撃的、扱いにくい牛は、総じてこの血統に求められる勇敢さと伸びを欠きました。緊張と見どころ——とりわけフアン・デ・カスティーリャ——はあったが、本物の闘牛は乏しい。フォンセカの耳は批評を二分しました。満員。<b>フェレーラ<\/b>：勧告後の沈黙、勧告後の沈黙。<b>フアン・デ・カスティーリャ<\/b>：沈黙と拍手。<b>イサーク・フォンセカ<\/b>：沈黙と耳1枚（6頭目「Secretario」）。デ・カスティーリャは5頭目に宙に投げられ、右足第2中足骨を骨折しました。"}, "rev11_o1": {"es": "La crítica más dura. Titula la oreja de Fonseca como «oreja populista» ante una «mansada seria». Elogia el tamaño y la presentación, pero reprocha la falta de casta y bravura: varios se defendieron, acortaron o se rajaron pronto. El sexto de Fonseca fue el único que empujó de verdad en el caballo y ofreció continuidad; aun así, describe la faena como animada pero superficial, más para excitar al público que para dominar técnicamente. Ferrera mostró oficio pero logró poco, y Juan de Castilla cargó con el lote más difícil y peor hecho.", "de": "Die härteste Kritik. Bezeichnet Fonsecas Ohr als „populistisches Ohr“ vor einer „ernsten Mansada“. Lobt Größe und Präsentation, tadelt aber den Mangel an Casta und Bravheit: mehrere verteidigten sich, verkürzten oder gaben früh auf. Fonsecas sechster war der Einzige, der wirklich am Pferd schob und Kontinuität bot; dennoch: eine muntere, aber oberflächliche Faena, mehr zum Anheizen des Publikums als zur technischen Beherrschung. Ferrera zeigte Können, erreichte aber wenig; Juan de Castilla trug das schwierigste, schlechteste Los.", "en": "The harshest review. It calls Fonseca's trophy a “populist ear” against a “serious mansada.” It praises size and presentation but faults the lack of caste and bravery: several defended themselves, shortened their charges or quit early. Fonseca's sixth was the only bull that truly pushed in the horse and offered continuity; even so, it describes the faena as animated but superficial, made more to excite the crowd than to dominate the bull technically. Ferrera showed experience but achieved little, and Juan de Castilla drew the most difficult, worst-made lot.", "ru": "Самая суровая рецензия. Называет трофей Фонсеки «популистским ухом» против «серьёзной мансады». Хвалит размер и презентацию, но упрекает в нехватке касты и храбрости: некоторые оборонялись, укорачивали атаки или рано сдавались. Шестой у Фонсеки — единственный, кто по-настоящему давил на лошадь и давал непрерывность; и всё же фаэна описана как живая, но поверхностная, скорее для возбуждения публики, чем для технического подчинения. Феррера показал ремесло, но добился малого, а Хуану де Кастилье достался самый трудный и худший жребий.", "ja": "最も厳しい評。フォンセカの耳を「深刻なマンサダ（臆病な牛群）」に対する「大衆迎合の耳」と評します。大きさと見栄えは称えつつ、カスタと勇敢さの欠如を非難——数頭が守りに入り、突進を縮め、早々に戦意を失いました。フォンセカの6頭目は馬に本当に押した唯一の牛で連続性もあったが、ファエナは活気はあれど表面的で、牛を技術的に支配するより観客を沸かせるためのものと描きます。フェレーラは経験を見せたが成果は乏しく、フアン・デ・カスティーリャは最も難しく出来の悪い組みを引きました。"}, "rev11_o2": {"es": "También ve la corrida muy bien presentada pero descastada y sin entrega. Da más crédito a Fonseca por afrontar el sexto con decisión y aprovechar el único toro con posibilidades reales. En esencia: Fonseca se ganó el único trofeo en medio de mucha dureza, mientras que a Ferrera y Juan de Castilla el mal juego de los animales les impidió triunfar.", "de": "Sieht die Corrida ebenfalls sehr gut präsentiert, aber descastada und ohne Hingabe. Gibt Fonseca mehr Kredit dafür, den sechsten entschlossen anzugehen und den einzigen Stier mit echten Möglichkeiten zu nutzen. Im Kern: Fonseca verdiente die einzige Trophäe inmitten großer Härte, während das schlechte Spiel der Tiere Ferrera und Juan de Castilla den Triumph verwehrte.", "en": "Also finds the corrida very well presented but descastada and lacking entrega. It gives Fonseca more credit for facing the sixth with determination and using the only bull with real possibilities. In essence: Fonseca earned the only trophy amid considerable hardness, while the animals' poor response largely prevented Ferrera and Juan de Castilla from triumphing.", "ru": "Тоже находит корриду отлично представленной, но бескастовой и без самоотдачи. Больше ставит в заслугу Фонсеке то, что он решительно встретил шестого и использовал единственного быка с реальными возможностями. По сути: Фонсека заслужил единственный трофей среди большой жёсткости, а плохая игра животных не дала триумфа Феррере и Хуану де Кастилье.", "ja": "同じく、見栄えは良いが「カスタなく」献身を欠く一戦と見ます。6頭目に果敢に立ち向かい、真の可能性を持つ唯一の牛を生かしたフォンセカをより評価。要は、フォンセカは大きな厳しさの中で唯一の賞を得、動物の乏しい動きがフェレーラとフアン・デ・カスティーリャの栄冠を阻んだ、と。"}, "rev11_o3": {"es": "Más comprensivo con los toreros: describe una corrida durísima, áspera y exigente, más que simplemente mala. Acepta la oreja de Fonseca como premio a la entrega ante el sexto, pero destaca la actuación de Juan de Castilla como de mérito notable: aguantó ante el quinto pese a sus embestidas inciertas, fue volteado con violencia y continuó la faena lesionado. A Ferrera se le vio especialmente perjudicado por la espada.", "de": "Verständnisvoller mit den Toreros: schildert eine sehr harte, raue und fordernde Corrida, mehr als bloß schlecht. Akzeptiert Fonsecas Ohr als Lohn für die Hingabe am sechsten, hebt aber die Leistung Juan de Castillas als besonders verdienstvoll hervor: hielt vor dem fünften trotz unsicherer Angriffe stand, wurde heftig aufgenommen und setzte die Faena verletzt fort. Ferrera sah man besonders vom Degen benachteiligt.", "en": "More sympathetic to the toreros: it describes an immensely difficult, abrasive and demanding corrida rather than simply a bad one. It accepts Fonseca's ear as the reward for commitment against the sixth, but singles out Juan de Castilla's performance as one of substantial merit: he stayed in front of the fifth despite its uncertain charges, was violently caught and continued the faena while injured. Ferrera was said to be especially damaged by the sword.", "ru": "Более сочувственно к тореро: описывает не просто плохую, а крайне трудную, жёсткую и требовательную корриду. Принимает ухо Фонсеки как награду за самоотдачу против шестого, но особо выделяет выступление Хуана де Кастильи как весьма достойное: он выстоял перед пятым, несмотря на неуверенные атаки, был жестоко подброшен и продолжил фаэну травмированным. Ферреру, по его словам, особенно подвела шпага.", "ja": "闘牛士により同情的。単に悪いというより、極めて難しく、荒く、過酷な一戦と描きます。フォンセカの耳は6頭目への献身の報酬として認めつつ、フアン・デ・カスティーリャの演技を特筆すべき見事さと評価——不確かな突進の5頭目の前で踏みとどまり、激しく宙に投げられ、負傷しながらファエナを続けました。フェレーラは特に剣で損をしたとされます。"}, "rev11_o4": {"es": "Sitúa a Fonseca y a «Secretario» como el argumento principal de la tarde, sugiriendo que el sexto fue el único toro capaz de un duelo coherente. Subraya también el coraje y el esfuerzo de Juan de Castilla con el quinto, sobre todo tras la dramática voltereta y la lesión en el pie.", "de": "Sieht Fonseca und „Secretario“ als das Hauptargument des Nachmittags und deutet an, der sechste sei der einzige Stier für einen kohärenten Zweikampf gewesen. Betont auch Mut und Einsatz Juan de Castillas beim fünften, besonders nach dem dramatischen Sturz und der Fußverletzung.", "en": "Identifies Fonseca and “Secretario” as the afternoon's principal argument, suggesting the sixth was the one bull capable of a coherent contest. It also stresses Juan de Castilla's courage and effort with the fifth, especially after the dramatic voltereta and foot injury.", "ru": "Определяет Фонсеку и «Secretario» как главный сюжет вечера, полагая, что шестой был единственным быком, способным на связный поединок. Подчёркивает также смелость и старание Хуана де Кастильи с пятым, особенно после драматичного броска и травмы стопы.", "ja": "フォンセカと「Secretario」を当日の主役とし、6頭目が筋の通った勝負を成立させ得た唯一の牛だったと示唆します。5頭目に対するフアン・デ・カスティーリャの勇気と奮闘も、とりわけ劇的な宙返りと足の負傷の後において強調します。"}, "rev11_o5": {"es": "La cobertura local se centró en el comportamiento insólito y cambiante de los Escolar: los toreros los describieron como «desobedientes y cambiantes», animales cuyas reacciones había que recalcular sin cesar. Su titular, «La dificultad de la suerte suprema», apunta además al flojo trabajo con la espada, que debilitó aún más una tarde ya complicada.", "de": "Die lokale Berichterstattung konzentrierte sich auf das ungewöhnliche, wechselhafte Verhalten der Escolar: Die Toreros nannten sie „desobedientes y cambiantes“, Tiere, deren Reaktionen ständig neu zu berechnen waren. Die Überschrift „La dificultad de la suerte suprema“ verweist zudem auf die schwache Degenarbeit, die einen ohnehin schwierigen Nachmittag weiter schwächte.", "en": "The local coverage centred on the unusual, ever-changing behaviour of the Escolar bulls: the toreros described them as “desobedientes y cambiantes,” animals whose reactions had to be recalculated continually. Its headline, “La dificultad de la suerte suprema,” also points to the poor sword work that further weakened an already difficult afternoon.", "ru": "Местное освещение сосредоточилось на необычном, переменчивом поведении быков Эскольяра: тореро назвали их «desobedientes y cambiantes» — животными, чьи реакции приходилось постоянно пересчитывать. Заголовок «La dificultad de la suerte suprema» указывает также на слабую работу шпагой, ещё больше ослабившую и без того трудный вечер.", "ja": "地元報道はエスコラルの牛の異様で変わりやすい挙動に注目——闘牛士は「従わず、変わり続ける」牛と評し、その反応を絶えず計算し直す必要があったとします。見出し「至高の一瞬（剣）の難しさ」は、ただでさえ難しい午後をさらに弱めた不出来な剣さばきをも指しています。"}, "rev11_take": {"es": "Una corrida de Pamplona de verdad en apariencia y peligro, pero no en bravura. Los Escolar se veían magníficos y exigían valor, pero demasiados fueron defensivos más que fieros. Juan de Castilla salió probablemente con el mayor crédito profesional: aceptó la dificultad, se plantó y siguió lesionado. Fonseca firmó el único triunfo claro, pero la oreja fue generosa —fruto de la entrega, el espectáculo y una buena espada más que de una faena plenamente construida—. El oficio de Ferrera se vio, pero ni sus toros ni su espada dejaron desarrollarse la tarde. En conjunto: seria, tensa y auténtica, pero más calvario que gran corrida.", "de": "Dem Anschein und der Gefahr nach eine echte Pamplona-Corrida, aber nicht der Bravheit nach. Die Escolar sahen prächtig aus und verlangten Mut, doch zu viele waren defensiv statt wild. Juan de Castilla ging wohl mit dem größten fachlichen Kredit heraus: nahm die Schwierigkeit an, hielt stand und machte verletzt weiter. Fonseca lieferte den einzigen klaren Triumph, doch das Ohr war großzügig — Frucht von Hingabe, Spektakel und gutem Degen, nicht einer voll aufgebauten Faena. Ferreras Können war sichtbar, doch weder seine Stiere noch sein Degen ließen den Nachmittag sich entfalten. Insgesamt: ernst, spannungsvoll und echt, aber mehr Martyrium als große Corrida.", "en": "A real Pamplona corrida in appearance and danger, but not in bravery. The Escolar bulls looked magnificent and demanded courage, yet too many were defensive rather than truly fierce. Juan de Castilla probably emerged with the greatest professional credit: he accepted the difficulty, stood his ground and continued while injured. Fonseca created the only clear triumph, but the ear was generous — the product of commitment, spectacle and a good sword rather than a fully constructed faena. Ferrera's experience was visible, but neither his bulls nor his sword let the afternoon develop. Overall: serious, tense and authentic — but more ordeal than great corrida.", "ru": "По виду и опасности — настоящая памплонская коррида, но не по храбрости. Быки Эскольяра выглядели великолепно и требовали смелости, но слишком многие были оборонительными, а не по-настоящему свирепыми. Хуан де Кастилья, вероятно, вышел с наибольшим профессиональным кредитом: принял трудность, выстоял и продолжил травмированным. Фонсека создал единственный явный триумф, но ухо было щедрым — плод самоотдачи, зрелища и хорошей шпаги, а не полностью выстроенной фаэны. Ремесло Ферреры было видно, но ни его быки, ни его шпага не дали вечеру развернуться. В целом: серьёзно, напряжённо и подлинно — но скорее испытание, чем великая коррида.", "ja": "見た目と危険性では本物のパンプローナの一戦だが、勇敢さではそうではない。エスコラルの牛は壮麗で勇気を要求したが、多くが真に猛々しいというより守勢だった。フアン・デ・カスティーリャがおそらく最も職業的な信用を得た——難しさを受け入れ、踏みとどまり、負傷しても続けた。フォンセカは唯一の明確な成功を挙げたが、耳は寛大なもの——完成されたファエナというより、献身と見世物、そして good な剣の産物だった。フェレーラの技量は見えたが、彼の牛も剣も午後を展開させなかった。総じて、真剣で張り詰め、本物ではあったが、大いなる一戦というより試練だった。"}});
Object.assign(I18N,{"enc_title": {"es": "El encierro", "de": "Der Encierro", "en": "The encierro", "ru": "Энсьерро", "ja": "牛追い（エンシエロ）"}, "enc_sub": {"es": "Crónica del encierro · 08:00", "de": "Chronik des Encierro · 08:00", "en": "Bull-run report · 08:00", "ru": "Хроника энсьерро · 08:00", "ja": "牛追い記録 · 08:00"}, "enc_facts": {"es": "Datos", "de": "Fakten", "en": "Key facts", "ru": "Факты", "ja": "要点"}, "enc_dur": {"es": "Duración", "de": "Dauer", "en": "Duration", "ru": "Длительность", "ja": "所要時間"}, "enc_herd": {"es": "Manada", "de": "Herde", "en": "Herd", "ru": "Стадо", "ja": "牛群"}, "enc_injuries": {"es": "Heridos", "de": "Verletzte", "en": "Injured", "ru": "Пострадавшие", "ja": "負傷者"}, "enc11_dur": {"es": "2 min 36 s", "de": "2 Min 36 s", "en": "2 min 36 s", "ru": "2 мин 36 с", "ja": "2分36秒"}, "enc11_herd": {"es": "Sábado muy concurrido; la manada empezó compacta y se fue descolgando", "de": "Sehr voller Samstag; die Herde begann kompakt und zerfiel zunehmend", "en": "Very crowded Saturday; the herd began compact and increasingly broke apart", "ru": "Очень людная суббота; стадо начало плотно и всё больше растягивалось", "ja": "混雑した土曜。牛群は当初まとまり、次第にばらけた"}, "enc11_inj": {"es": "14 heridos: 1 por asta (cornada en la cara, en Mercaderes) y 13 por contusiones", "de": "14 Verletzte: 1 durch Hornstoß (Gesicht, in Mercaderes) und 13 mit Prellungen", "en": "14 injured: 1 gored (horn wound to the face, at Mercaderes) and 13 with contusions", "ru": "14 пострадавших: 1 от рога (рана лица, на Меркадерес) и 13 с ушибами", "ja": "負傷14名：角による1名（メルカデレスで顔面）と打撲13名"}, "enc11_summary": {"es": "El quinto encierro, con los toros de José Escolar, fue el más accidentado de la feria hasta la fecha. Carrera larga y peligrosa en un sábado abarrotado: la manada se rompió y se sucedieron las caídas, con escenas comprometidas en Mercaderes y en la entrada a la plaza. El herido por asta fue identificado localmente como un hombre de 30 años de Alicante.", "de": "Der fünfte Encierro, mit den Stieren von José Escolar, war der bislang unfallreichste der Feria. Ein langer, gefährlicher Lauf an einem überfüllten Samstag: Die Herde zerfiel, es häuften sich die Stürze, mit heiklen Szenen in Mercaderes und an der Arena-Einfahrt. Der durch Hornstoß Verletzte wurde lokal als 30-jähriger Mann aus Alicante identifiziert.", "en": "The fifth encierro, with the José Escolar bulls, was the most accident-filled run of the feria so far. A long, dangerous race on a packed Saturday: the herd broke apart and falls piled up, with hairy scenes at Mercaderes and the arena entrance. The gored runner was identified locally as a 30-year-old man from Alicante.", "ru": "Пятый энсьерро, с быками Хосе Эскольяра, стал самым аварийным на ферии к этому моменту. Долгий и опасный забег в переполненную субботу: стадо распалось, участились падения, с рискованными сценами на Меркадерес и у входа на арену. Раненого рогом местно опознали как 30-летнего мужчину из Аликанте.", "ja": "ホセ・エスコラルの牛による第5の牛追いは、これまでのフェリアで最も事故の多い一走となりました。混雑した土曜の長く危険な走り——牛群がばらけ、転倒が相次ぎ、メルカデレスや闘牛場入口で際どい場面も。角で負傷した男性は、地元でアリカンテ出身の30歳と伝えられました。"}, "enc11_o1": {"es": "La prensa local (Diario de Navarra, Noticias de Navarra, Pamplona Actual, EITB, Cadena SER) dio la lectura más matizada: encierro sabatino masivo, peligroso sobre todo porque la manada se rompió y por la mezcla de corredores expertos y novatos. Diario de Navarra lo describió como el más largo de los cinco primeros y contabilizó 15 incidencias médicas —lo que explica las cifras iniciales dispares—; EITB lo calificó de «peligrosísimo».", "de": "Die Lokalpresse (Diario de Navarra, Noticias de Navarra, Pamplona Actual, EITB, Cadena SER) lieferte die differenzierteste Lesart: ein massiver Samstags-Encierro, gefährlich vor allem, weil die Herde zerfiel und wegen der Mischung aus erfahrenen und unerfahrenen Läufern. Diario de Navarra nannte ihn den längsten der ersten fünf und zählte 15 medizinische Vorfälle — was die anfangs abweichenden Zahlen erklärt; EITB nannte ihn „peligrosísimo“.", "en": "The local press (Diario de Navarra, Noticias de Navarra, Pamplona Actual, EITB, Cadena SER) offered the most nuanced read: a massive Saturday encierro, dangerous mainly because the herd broke apart and because of the mix of expert and first-time runners. Diario de Navarra called it the longest of the first five and logged 15 medical incidents — explaining the differing early totals; EITB called it “peligrosísimo.”", "ru": "Местная пресса (Diario de Navarra, Noticias de Navarra, Pamplona Actual, EITB, Cadena SER) дала самую взвешенную оценку: массовый субботний энсьерро, опасный прежде всего потому, что стадо распалось, и из-за смеси опытных и впервые бегущих. Diario de Navarra назвала его самым длинным из первых пяти и насчитала 15 медицинских случаев — отсюда расхождения в первых цифрах; EITB назвал его «peligrosísimo».", "ja": "地元紙（Diario de Navarra、Noticias de Navarra、Pamplona Actual、EITB、Cadena SER）が最も丁寧な解釈を示しました。大混雑の土曜の牛追いで、危険の主因は牛群の分断と、熟練者と初参加者の混在。Diario de Navarra は最初の5走で最長とし、医療対応15件を記録——初期の数字の差はこれで説明されます。EITB は「極めて危険（peligrosísimo）」と表現しました。"}, "enc11_o2": {"es": "La prensa internacional (AP, Reuters, Los Angeles Times, People, RTVE) se centró en lo más dramático: la cornada en la cara, el toro negro descolgado que embistió a los corredores, el «caos» y la referencia al centenario de la novela de Hemingway. AP fue el teletipo principal, reproducido en todo el mundo; Reuters distribuyó sobre todo fotografía. Se prestó poca atención a la calidad de las carreras o al comportamiento de los Escolar más allá de los incidentes.", "de": "Die internationale Presse (AP, Reuters, Los Angeles Times, People, RTVE) konzentrierte sich auf das Dramatischste: den Hornstoß ins Gesicht, den abgelösten schwarzen Stier, der in die Läufer stieß, das „Chaos“ und den Bezug zum Hundertjährigen der Hemingway-Novelle. AP war die Hauptmeldung, weltweit nachgedruckt; Reuters lieferte vor allem Fotos. Der Qualität der Läufe oder dem Verhalten der Escolar jenseits der Vorfälle wurde wenig Beachtung geschenkt.", "en": "The international press (AP, Reuters, Los Angeles Times, People, RTVE) fixed on the most dramatic: the facial goring, the detached black bull charging into runners, the “chaos,” and the tie-in to the centenary of Hemingway's novel. AP was the main wire story, reproduced worldwide; Reuters distributed mostly photography. Little attention went to the quality of the runs or the Escolar bulls' behaviour beyond the incidents.", "ru": "Международная пресса (AP, Reuters, Los Angeles Times, People, RTVE) сосредоточилась на самом драматичном: ранении лица, отбившемся чёрном быке, врезавшемся в бегущих, «хаосе» и привязке к столетию романа Хемингуэя. AP была главной телеграфной заметкой, перепечатанной по всему миру; Reuters распространял в основном фотографии. Качеству забегов и поведению быков Эскольяра вне инцидентов внимания почти не уделяли.", "ja": "国際報道（AP、Reuters、Los Angeles Times、People、RTVE）は最も劇的な点に集中——顔面の角傷、群れから離れて走者に突進した黒毛の牛、「混沌」、そしてヘミングウェイの小説の百周年への言及。AP が主要通信記事として世界中で転載され、Reuters は主に写真を配信しました。走りの質やエスコラルの牛の挙動は、劇的な事故以外ほとんど扱われませんでした。"}});
Object.assign(I18N,{"feat_kicker": {"es": "Reportaje · Diario de Navarra", "de": "Reportage · Diario de Navarra", "en": "Feature · Diario de Navarra", "ru": "Репортаж · Diario de Navarra", "ja": "特集 · Diario de Navarra"}, "feat_title": {"es": "El asiento que une a la Peña Borussia con Hemingway", "de": "Der Sitz, der die Peña Borussia mit Hemingway verbindet", "en": "The seat that links the Peña Borussia to Hemingway", "ru": "Место, что связывает Пенью Боруссия с Хемингуэем", "ja": "ペーニャ・ボルシアとヘミングウェイを結ぶ座席"}, "feat_date": {"es": "12 jul 2026", "de": "12. Juli 2026", "en": "12 Jul 2026", "ru": "12 июл 2026", "ja": "2026年7月12日"}, "feat_lede": {"es": "Con el centenario de la novela «Fiesta», la Peña ha descubierto que uno de sus asientos de la Sobrepuerta —el que hoy ocupa su portavoz, Günter Bonas— es el mismo desde el que Ernest Hemingway siguió los Sanfermines de 1926.", "de": "Zum hundertjährigen Jubiläum des Romans „Fiesta“ hat die Peña entdeckt, dass einer ihrer Sobrepuerta-Plätze — der, den heute ihr Sprecher Günter Bonas einnimmt — derselbe ist, von dem aus Ernest Hemingway 1926 die Sanfermines verfolgte.", "en": "With the centenary of the novel “Fiesta”, the Peña has discovered that one of its Sobrepuerta seats — the one its spokesman Günter Bonas occupies today — is the very seat from which Ernest Hemingway watched the 1926 Sanfermines.", "ru": "К столетию романа «Фиеста» Пенья обнаружила, что одно из её мест на Собрепуэрте — то, что сегодня занимает её представитель Гюнтер Бонас, — это то самое место, откуда Эрнест Хемингуэй смотрел Сан-Фермин 1926 года.", "ja": "小説『日はまた昇る（フィエスタ）』の百周年に際し、ペーニャは自分たちのソブレプエルタ席のひとつ——現在は代表のギュンター・ボナスが座る席——が、1926年にヘミングウェイがサンフェルミンを観戦したまさにその席であることを突き止めました。"}, "feat_body": {"es": "El hallazgo parte de una imagen publicada en 1990 en el libro «Hemingway y su mundo», de A. E. Hotchner, releído por la Peña con motivo del centenario. Jesús Barrientos, vinculado a la Peña y a Paderborn —ciudad hermanada con Pamplona desde 1992—, relata cómo la novela que Hemingway publicó en 1926 inspiró en 1963 a tres jóvenes de Mönchengladbach a viajar en su Fiat 500 hasta Pamplona; su localidad de la Sobrepuerta, en el Tendido 1, es «territorio» de la Peña desde 1979. El reportaje añade un guiño a los precios: en 1926 una entrada costaba 14 pesetas; hoy, 71 euros —unas 11.813 pesetas—.", "de": "Der Fund geht auf ein 1990 im Buch „Hemingway und seine Welt“ von A. E. Hotchner veröffentlichtes Bild zurück, das die Peña zum Jubiläum erneut las. Jesús Barrientos — verbunden mit der Peña und mit Paderborn, seit 1992 Partnerstadt Pamplonas — schildert, wie der 1926 erschienene Roman 1963 drei junge Männer aus Mönchengladbach inspirierte, in ihrem Fiat 500 nach Pamplona zu fahren; ihr Sobrepuerta-Platz im Tendido 1 ist seit 1979 das „Revier“ der Peña. Die Reportage spielt auch auf die Preise an: 1926 kostete eine Karte 14 Peseten; heute 71 Euro — rund 11.813 Peseten.", "en": "The discovery began with an image published in 1990 in A. E. Hotchner's book “Hemingway and His World”, which the Peña reread for the centenary. Jesús Barrientos — linked to the Peña and to Paderborn, Pamplona's twin city since 1992 — recounts how the novel Hemingway published in 1926 inspired three young men from Mönchengladbach in 1963 to drive their Fiat 500 to Pamplona; their Sobrepuerta seat in Tendido 1 has been the Peña's “territory” since 1979. The feature adds a note on prices: in 1926 a ticket cost 14 pesetas; today, €71 — about 11,813 pesetas.", "ru": "Открытие началось со снимка, опубликованного в 1990 году в книге А. Э. Хотчнера «Хемингуэй и его мир», которую Пенья перечитала к столетию. Хесус Барриентос — связанный с Пеньей и с Падерборном, городом-побратимом Памплоны с 1992 года — рассказывает, как роман, изданный Хемингуэем в 1926-м, вдохновил в 1963 году троих молодых людей из Мёнхенгладбаха приехать на «Фиате-500» в Памплону; их место на Собрепуэрте в Тендидо 1 — «территория» Пеньи с 1979 года. Репортаж добавляет штрих о ценах: в 1926-м билет стоил 14 песет; сегодня — 71 евро, около 11 813 песет.", "ja": "発見のきっかけは、A・E・ホッチナーの著書『ヘミングウェイと彼の世界』（1990年）に載った一枚の写真で、ペーニャは百周年を機にこれを読み返しました。ペーニャと、1992年よりパンプローナの姉妹都市であるパーダーボルンに関わるヘスス・バリエントスは、ヘミングウェイが1926年に発表した小説が、1963年にメンヒェングラートバッハの若者3人をフィアット500でパンプローナへ向かわせた経緯を語ります。テンディード1のソブレプエルタにある彼らの席は、1979年以来ペーニャの「縄張り」です。記事は値段にも触れます——1926年の入場券は14ペセタ、今日は71ユーロ（約11,813ペセタ）。"}, "feat_quote": {"es": "«Aunque pueda parecer algo exagerado, nos atrevemos a afirmar que el río Arga es para todos nosotros la fuente de la eterna juventud. Nos resulta tan familiar como el Rin; no en vano, antiguamente se llamaba Runa.»", "de": "„Auch wenn es vielleicht etwas übertrieben klingen mag, wagen wir zu behaupten, dass der Fluss Arga für uns alle die Quelle der ewigen Jugend ist. Er ist uns so vertraut wie der Rhein; nicht umsonst hieß er früher Runa.“", "en": "“Though it may sound a little exaggerated, we dare to say that the river Arga is for us all the fountain of eternal youth. It is as familiar to us as the Rhine; not for nothing was it once called Runa.”", "ru": "«Пусть это прозвучит несколько преувеличенно, но мы осмелимся сказать, что река Арга для всех нас — источник вечной молодости. Она нам так же родна, как Рейн; недаром прежде её звали Руна.»", "ja": "「少し大げさに聞こえるかもしれませんが、私たちはあえて言います——アルガ川は私たち皆にとって永遠の若さの泉なのだと。ライン川と同じように親しみ深く、かつて Runa と呼ばれたのも故なきことではありません。」"}, "feat_quote_by": {"es": "Günter Bonas · portavoz de la Peña Borussia", "de": "Günter Bonas · Sprecher der Peña Borussia", "en": "Günter Bonas · spokesman of the Peña Borussia", "ru": "Гюнтер Бонас · представитель Пеньи Боруссия", "ja": "ギュンター・ボナス · ペーニャ・ボルシア代表"}, "feat_priceh": {"es": "De 14 pesetas a 71 euros", "de": "Von 14 Peseten zu 71 Euro", "en": "From 14 pesetas to 71 euros", "ru": "От 14 песет до 71 евро", "ja": "14ペセタから71ユーロへ"}});
Object.assign(I18N,{"press_section": {"es": "En la prensa", "de": "In der Presse", "en": "In the press", "ru": "В прессе", "ja": "報道より"}, "faz_date": {"es": "9 jul 2026", "de": "9. Juli 2026", "en": "9 Jul 2026", "ru": "9 июл 2026", "ja": "2026年7月9日"}, "faz_title": {"es": "La Generación Z ama los toros", "de": "Die Generation Z liebt Stierkampf", "en": "Generation Z loves bullfighting", "ru": "Поколение Z любит корриду", "ja": "Z世代は闘牛を愛する"}, "faz_summary": {"es": "El Frankfurter Allgemeine (FAZ) dedica un amplio reportaje al auge del toreo entre los jóvenes españoles. Su tesis: los ataques y las prohibiciones al toro han vuelto a hacerlo interesante para la Generación Z. Cita a ANOET (21.569 festejos y 6,2 millones de espectadores en 2024, un cuarto de ellos entre 15 y 24 años), el efecto Morante, ferias agotadas y a jóvenes aficionados como Javier Nebreda, presidente del club «Cocherito de Bilbao». También aborda la batalla cultural y política: subvenciones de Vox frente a un proyecto del ministerio de Juventud contra la violencia hacia los animales, y cómo las plazas se reinventan como «evento» (Las Ventas de noche con DJ y flamenco en vivo).", "de": "Die Frankfurter Allgemeine (FAZ) widmet dem Aufschwung des Stierkampfs bei jungen Spaniern eine große Reportage. Ihre These: Angriffe und Verbote gegen den Stierkampf haben ihn für die Generation Z wieder interessant gemacht. Sie zitiert ANOET (21.569 Veranstaltungen und 6,2 Mio. Zuschauer 2024, ein Viertel davon zwischen 15 und 24), den Morante-Effekt, ausverkaufte Ferias und junge Aficionados wie Javier Nebreda, Präsident des Clubs „Cocherito de Bilbao“. Auch der kulturelle und politische Streit kommt vor: Vox-Subventionen gegenüber einem Gesetzentwurf des Jugendministeriums gegen Gewalt an Tieren, und wie sich die Arenen als „Event“ neu erfinden (Las Ventas nachts mit DJ und Live-Flamenco).", "en": "The Frankfurter Allgemeine (FAZ) devotes a wide feature to the rise of bullfighting among young Spaniards. Its thesis: attacks on and bans against the bull have made it interesting again for Generation Z. It cites ANOET (21,569 events and 6.2 million spectators in 2024, a quarter of them aged 15–24), the Morante effect, sold-out ferias, and young aficionados such as Javier Nebreda, president of the “Cocherito de Bilbao” club. It also covers the cultural and political battle: Vox subsidies versus a Youth Ministry bill against violence to animals, and how the rings reinvent themselves as an “event” (Las Ventas by night with a DJ and live flamenco).", "ru": "Frankfurter Allgemeine (FAZ) посвящает большой репортаж подъёму корриды среди молодых испанцев. Тезис: нападки и запреты вокруг быка вновь сделали её интересной для поколения Z. Цитируются ANOET (21 569 мероприятий и 6,2 млн зрителей в 2024-м, четверть из них 15–24 лет), эффект Моранте, аншлаговые феерии и молодые любители вроде Хавьера Небреды, президента клуба «Cocherito de Bilbao». Затрагивается и культурно-политическая борьба: субсидии Vox против законопроекта Министерства по делам молодёжи о насилии над животными, и как арены переизобретают себя как «событие» (Las Ventas ночью с диджеем и живым фламенко).", "ja": "フランクフルター・アルゲマイネ（FAZ）が、スペインの若者の間での闘牛人気の高まりを大きく特集。主張は、闘牛への攻撃と禁止の動きが、かえってZ世代に闘牛を再び魅力的にした、というもの。ANOET（2024年に21,569公演・観客620万人、うち4分の1が15〜24歳）、モランテ効果、完売のフェリア、そして「コチェリート・デ・ビルバオ」会長ハビエル・ネブレダのような若い愛好家に言及します。文化的・政治的対立にも触れ、Vox の助成金と、動物への暴力を扱う青年省の法案、そして闘牛場が「イベント」として自らを作り変える様子（夜のラス・ベンタスでのDJと生フラメンコ）を描きます。"}});
Object.assign(I18N,{"feat_cap_ticket": {"es": "Entrada de la Peña para el 7 de julio de 2026, en el mismo asiento (n.º 4) que ocupó Hemingway.", "de": "Eintrittskarte der Peña für den 7. Juli 2026, auf demselben Platz (Nr. 4), den Hemingway nutzte.", "en": "The Peña's ticket for 7 July 2026, in the same seat (no. 4) Hemingway used.", "ru": "Билет Пеньи на 7 июля 2026 года — на том же месте (№ 4), что занимал Хемингуэй.", "ja": "ペーニャの2026年7月7日の入場券。ヘミングウェイが座ったのと同じ席（4番）。"}, "feat_cap_crowd": {"es": "La Peña Borussia en la corrida del 10 de julio de 2026.", "de": "Die Peña Borussia bei der Corrida am 10. Juli 2026.", "en": "The Peña Borussia at the corrida on 10 July 2026.", "ru": "Пенья Боруссия на корриде 10 июля 2026 года.", "ja": "2026年7月10日の闘牛でのペーニャ・ボルシア。"}, "feat_cta": {"es": "Leer en Diario de Navarra", "de": "Bei Diario de Navarra lesen", "en": "Read at Diario de Navarra", "ru": "Читать в Diario de Navarra", "ja": "Diario de Navarra で読む"}, "feat_source": {"es": "Reportaje: Diario de Navarra · 12 jul 2026", "de": "Reportage: Diario de Navarra · 12. Juli 2026", "en": "Feature: Diario de Navarra · 12 Jul 2026", "ru": "Репортаж: Diario de Navarra · 12 июл 2026", "ja": "特集：Diario de Navarra · 2026年7月12日"}});
Object.assign(I18N,{"rev12_summary": {"es": "La Palmosilla ofreció varios toros de embestida noble y prolongada —sobre todo el quinto—, aunque la falta general de fuerza y el viento impidieron que la tarde despegara del todo. <b>Fernando Adrián<\/b> cortó una oreja; <b>Samuel Navalón<\/b> y <b>Fortes<\/b> se fueron de vacío. Tarde ganadera interesante, con más promesa que cumplimiento.", "de": "La Palmosilla lieferte mehrere Stiere mit edlem, lang gezogenem Angriff — vor allem den fünften —, doch der allgemeine Kraftmangel und der Wind verhinderten, dass der Nachmittag ganz abhob. <b>Fernando Adrián<\/b> schnitt ein Ohr; <b>Samuel Navalón<\/b> und <b>Fortes<\/b> gingen leer aus. Ein interessanter Zuchtnachmittag, mit mehr Versprechen als Erfüllung.", "en": "La Palmosilla supplied several bulls with noble, flowing charges — especially the fifth — though the overall lack of strength and the wind kept the afternoon from fully taking off. <b>Fernando Adrián<\/b> cut one ear; <b>Samuel Navalón<\/b> and <b>Fortes<\/b> went empty-handed. An interesting livestock afternoon, with more promise than fulfilment.", "ru": "Ла-Пальмосилья дала несколько быков с благородной, протяжной атакой — особенно пятого, — но общая нехватка сил и ветер помешали вечеру раскрыться в полной мере. <b>Фернандо Адриан<\/b> отрезал ухо; <b>Самуэль Навалон<\/b> и <b>Фортес<\/b> остались ни с чем. Интересный «скотоводческий» вечер — больше обещаний, чем свершений.", "ja": "ラ・パルモシーリャは、気高く伸びのある突進の牛を数頭——とりわけ5頭目——出したが、全体的な力不足と風のため、午後は完全には盛り上がらなかった。<b>フェルナンド・アドリアン<\/b>が耳1枚、<b>サムエル・ナバロン<\/b>と<b>フォルテス<\/b>は無冠。牛としては興味深い午後で、成就より将来性が勝った。"}, "rev12_o1": {"es": "Vio una corrida más interesante de lo que dice el marcador, centrada en un notable quinto de embestida noble y prolongada. Consideró a Fernando Adrián ganador estadístico, pero con la crítica —razonable— de que dejó algo con el mejor lote: su oreja fue defendible en el contexto de Pamplona, aunque ese quinto pedía una faena más honda y completa.", "de": "Sah eine interessantere Corrida, als es das Ergebnis sagt, zentriert auf einen bemerkenswerten fünften mit edlem, lang gezogenem Angriff. Fernando Adrián sei der statistische Sieger, doch mit der — berechtigten — Kritik, dass er beim besten Los etwas liegen ließ: sein Ohr im Kontext Pamplonas vertretbar, aber dieser fünfte verlangte eine tiefere, vollständigere Faena.", "en": "Saw a more interesting corrida than the scoreline suggests, centred on a notable fifth of noble, prolonged charge. Rated Fernando Adrián the statistical winner, but with the reasonable criticism that he left something behind with the best lot: his ear was defensible in the Pamplona context, though that fifth called for a deeper, more complete faena.", "ru": "Увидел корриду интереснее, чем говорит счёт, с центром на заметном пятом — благородной, протяжной атаки. Фернандо Адриана назвал статистическим победителем, но с обоснованным упрёком, что он недоработал с лучшим жребием: ухо оправданно в памплонском контексте, но тот пятый требовал более глубокой и цельной фаэны.", "ja": "点数以上に面白い一戦と見て、その中心は気高く伸びる突進の見事な5頭目。フェルナンド・アドリアンを数字上の勝者としつつ、最良の組みでやり残したという妥当な批判も。耳はパンプローナの文脈では擁護可能だが、あの5頭目はより深く完全なファエナを求めていた、と。"}, "rev12_o2": {"es": "Destacó a Samuel Navalón como la impresión más fuerte a largo plazo: joven, variado y dispuesto, aunque le faltaran mando completo y eficacia final. Y subrayó el mérito profesional de Fortes, que toreó lesionado y con el lote menos aprovechable.", "de": "Hob Samuel Navalón als den stärksten Langzeiteindruck hervor: jung, abwechslungsreich und willig, wenn auch ohne vollständiges Kommando und finale Wirksamkeit. Und betonte Fortes' fachliches Verdienst, der verletzt und mit dem am wenigsten brauchbaren Los kämpfte.", "en": "Singled out Samuel Navalón as the strongest long-term impression: young, varied and willing, even if he lacked complete command and final effectiveness. And stressed Fortes's professional credit for fighting injured and with the least useful lot.", "ru": "Выделил Самуэля Навалона как самое сильное впечатление на перспективу: молод, разнообразен и охоч, пусть и без полного контроля и финальной результативности. И подчеркнул профессиональную заслугу Фортеса, сражавшегося травмированным и с наименее удобным жребием.", "ja": "サムエル・ナバロンを長期的に最も強い印象として特筆——若く、多彩で意欲的、完全な制御と最後の仕留めには欠けたが。そして負傷しつつ最も使いにくい組みと戦ったフォルテスの職業的功績を強調した。"}, "rev12_take": {"es": "Mejor corrida de lo que indica el resultado de una oreja, pero también una ocasión perdida. Fernando Adrián fue el ganador estadístico, aunque el quinto probablemente merecía una faena más profunda; Navalón dejó la impresión más prometedora a futuro y Fortes, mérito por lidiar lesionado. Un apunte crítico: no nos gusta la nueva moda de iniciar faenas o buscar efectos de rodillas frente al toro —vale para el chupinazo, no para una corrida; suele oler más a emoción fácil que a temple y mando—. En conjunto: tarde ganadera interesante, con un quinto notable, con más promesa que cumplimiento.", "de": "Eine bessere Corrida, als das Ein-Ohr-Ergebnis sagt, aber auch eine verpasste Gelegenheit. Fernando Adrián war der statistische Sieger, doch der fünfte verdiente wohl eine tiefere Faena; Navalón hinterließ den zukunftsträchtigsten Eindruck, und Fortes gebührt Anerkennung fürs Kämpfen trotz Verletzung. Ein kritischer Punkt: Uns missfällt die neue Mode, Faenas kniend direkt vor dem Stier zu beginnen oder Effekte zu suchen — passt zum Chupinazo, nicht zur Corrida; es riecht oft mehr nach billiger Erregung als nach Temple und Herrschaft. Insgesamt: interessanter Zuchtnachmittag mit einem bemerkenswerten fünften, mehr Versprechen als Erfüllung.", "en": "A better bullfight than the one-ear result indicates, but also a missed opportunity. Fernando Adrián was the statistical winner, though the fifth probably deserved a deeper faena; Navalón left the most promising long-term impression, and Fortes deserves credit for fighting injured. One critical note: we increasingly dislike the new fashion for beginning faenas or creating effects while kneeling directly in front of the bull — fine for the chupinazo, not a corrida; too often it smells of easy excitement rather than control and classical authority. Overall: an interesting livestock afternoon, centred on a notable fifth bull, with more promise than fulfilment.", "ru": "Коррида лучше, чем говорит результат в одно ухо, но и упущенная возможность. Фернандо Адриан — статистический победитель, хотя пятый, вероятно, заслуживал более глубокой фаэны; Навалон оставил самое перспективное впечатление, а Фортес достоин уважения за бой с травмой. Критическая заметка: нам всё меньше нравится новая мода начинать фаэны или создавать эффекты, стоя на коленях прямо перед быком, — уместно для чупинасо, но не для корриды; часто это отдаёт дешёвым азартом, а не темпом и властью. В целом: интересный «скотоводческий» вечер с заметным пятым — больше обещаний, чем свершений.", "ja": "耳1枚という結果以上に良い一戦だが、好機を逃しもした。フェルナンド・アドリアンが数字上の勝者だが、5頭目はおそらくより深いファエナに値した。ナバロンが将来最も有望な印象を残し、フォルテスは負傷しての闘牛に敬意を。批判を一点——牛の正面で跪いてファエナを始めたり効果を狙う新しい流行が、我々はますます好きになれない。チュピナソには合っても、コリーダには合わない。制御や古典的な威厳より、安易な興奮の匂いがすることが多い。総じて、見事な5頭目を軸にした興味深い牛の午後で、成就より将来性が勝った。"}, "enc12_dur": {"es": "2 min 23 s", "de": "2 Min 23 s", "en": "2 min 23 s", "ru": "2 мин 23 с", "ja": "2分23秒"}, "enc12_herd": {"es": "Domingo con muchísima gente; la manada se estiró y se rompió en Estafeta y un toro llegó solo a la entrada de la plaza", "de": "Sonntag mit sehr vielen Menschen; die Herde zog sich auseinander und brach in der Estafeta, ein Stier erreichte allein den Arena-Eingang", "en": "Sunday with a huge crowd; the herd stretched and split on Estafeta and a bull reached the ring entrance alone", "ru": "Воскресенье с огромной толпой; стадо растянулось и распалось на Эстафете, а один бык в одиночку добежал до входа на арену", "ja": "大混雑の日曜。牛群はエスタフェタで伸びて分断し、1頭が単独で闘牛場入口に到達"}, "enc12_inj": {"es": "9 heridos: 1 por asta (cornada en el codo, en el callejón de acceso a la plaza) y 8 por contusiones; cinco traslados iniciales al Hospital Universitario de Navarra", "de": "9 Verletzte: 1 durch Hornstoß (Ellbogen, im Zugangs-Callejón zur Arena) und 8 mit Prellungen; fünf anfängliche Transporte ins Hospital Universitario de Navarra", "en": "9 injured: 1 gored (horn wound to the elbow, in the callejón into the ring) and 8 with contusions; five initial transfers to the Hospital Universitario de Navarra", "ru": "9 пострадавших: 1 от рога (рана локтя, в кальехоне на входе на арену) и 8 с ушибами; пять первоначальных госпитализаций в Университетскую больницу Наварры", "ja": "負傷9名：角による1名（闘牛場へ入る通路〈カジェホン〉で肘に角傷）と打撲8名。当初ナバラ大学病院へ5名搬送"}, "enc12_summary": {"es": "El sexto encierro, con toros de La Palmosilla, fue rápido pero muy congestionado y accidentado, sobre todo cuando la manada se separó en Estafeta y un toro llegó solo al callejón de entrada a la plaza. El veredicto recurrente: toros veloces y nobles, pero demasiados corredores y un final peligroso y desordenado.", "de": "Der sechste Encierro, mit Stieren von La Palmosilla, war schnell, aber sehr überfüllt und unfallreich — vor allem, als sich die Herde in der Estafeta trennte und ein Stier allein den Zugangs-Callejón zur Arena erreichte. Das wiederkehrende Urteil: schnelle, edle Stiere, aber zu viele Läufer und ein gefährliches, ungeordnetes Ende.", "en": "The sixth encierro, with La Palmosilla bulls, was fast but highly congested and accident-filled, especially when the herd separated on Estafeta and a bull reached the callejón into the ring alone. The recurring verdict: fast, noble bulls, but too many runners and a dangerous, disordered finish.", "ru": "Шестой энсьерро, с быками Ла-Пальмосильи, был быстрым, но крайне перегруженным и аварийным — особенно когда стадо разделилось на Эстафете, а один бык в одиночку добрался до кальехона на входе в арену. Повторяющийся вердикт: быстрые и благородные быки, но слишком много бегущих и опасный, беспорядочный финал.", "ja": "ラ・パルモシーリャの牛による第6の牛追いは、速いが非常に混雑し事故が多かった——とりわけ牛群がエスタフェタで分かれ、1頭が単独で闘牛場入口の通路に達したとき。繰り返された総括は、速く気高い牛だが、走者が多すぎ、危険で無秩序な終盤、というもの。"}, "enc12_o1": {"es": "Prensa local y navarra: Noticias de Navarra lo describió como rápido pero accidentado, subrayando el gentío dominical, cinco traslados iniciales al Hospital Universitario de Navarra y el peligro cuando la manada se estiró y dividió. Diario de Navarra siguió el desarrollo visual —salida ordenada en Santo Domingo, separación creciente en Estafeta y llegada desordenada al callejón—. Cadena SER Navarra presentó a La Palmosilla como manada muy veloz y noble, y atribuyó a ese comportamiento franco el que no hubiera heridas más graves.", "de": "Lokale und navarresische Presse: Noticias de Navarra beschrieb ihn als schnell, aber unfallreich, mit Betonung des sonntäglichen Andrangs, fünf anfänglicher Transporte ins Hospital Universitario de Navarra und der Gefahr, als sich die Herde streckte und teilte. Diario de Navarra verfolgte den visuellen Ablauf — geordneter Start in Santo Domingo, wachsende Trennung in der Estafeta, ungeordnete Ankunft am Callejón. Cadena SER Navarra stellte La Palmosilla als sehr schnelle, edle Herde vor und schrieb diesem klaren Verhalten zu, dass es keine schwereren Verletzungen gab.", "en": "Local and Navarra press: Noticias de Navarra described it as rapid but accident-filled, stressing the Sunday crowd, five initial transfers to the Hospital Universitario de Navarra and the danger as the herd stretched and divided. Diario de Navarra tracked the visual development — an orderly start at Santo Domingo, growing separation on Estafeta and a disorderly arrival at the callejón. Cadena SER Navarra presented La Palmosilla as a notably fast, noble herd and credited that straightforward behaviour with preventing more serious injuries.", "ru": "Местная и наваррская пресса: Noticias de Navarra назвала забег быстрым, но аварийным, подчёркивая воскресную толпу, пять первоначальных госпитализаций в Университетскую больницу Наварры и опасность, когда стадо растянулось и разделилось. Diario de Navarra проследила визуальное развитие — упорядоченный старт у Санто-Доминго, растущее разделение на Эстафете и беспорядочный приход к кальехону. Cadena SER Navarra представила Ла-Пальмосилью как очень быстрое и благородное стадо и приписала этому прямому поведению отсутствие более тяжёлых травм.", "ja": "地元・ナバラ紙：Noticias de Navarra は速いが事故の多い一走とし、日曜の人出、ナバラ大学病院への当初5名の搬送、牛群が伸びて分かれた際の危険を強調。Diario de Navarra は視覚的展開を追い——サント・ドミンゴでの整然とした出発、エスタフェタでの分離拡大、通路への無秩序な到達。Cadena SER Navarra はラ・パルモシーリャを非常に速く気高い牛群と紹介し、その素直な挙動がより重い負傷を防いだとした。"}, "enc12_o2": {"es": "Prensa nacional: El País lo calificó de sexto encierro rápido, pero peligroso por el gentío del fin de semana; su imagen central fue la de un toro solitario entrando al callejón, golpeando las tablas de la izquierda y derribando a varios corredores; aun así juzgó noble el comportamiento de los La Palmosilla. RTVE lo enmarcó como otro encierro muy veloz en la recta final de la feria, subrayando la velocidad y la tensión al abrirse la manada. La cobertura internacional fue sobre todo fotográfica (Reuters y AP distribuyeron imágenes de caídas y densidad de corredores): al ser la cornada de codo menos dramática que la del día 11 en la cara, generó muchos menos titulares extranjeros.", "de": "Nationale Presse: El País nannte ihn einen schnellen sechsten Encierro, aber gefährlich durch den Wochenendandrang; das zentrale Bild war ein einzelner Stier, der in den Callejón einbog, die linken Bretter traf und mehrere Läufer umwarf; dennoch beurteilte er das Verhalten der La Palmosilla als edel. RTVE rahmte ihn als weiteren sehr schnellen Encierro in der Schlussphase der Feria, mit Betonung von Tempo und Spannung beim Aufbrechen der Herde. Die internationale Berichterstattung war vor allem fotografisch (Reuters und AP verbreiteten Bilder von Stürzen und Läuferdichte): Da der Ellbogen-Hornstoß weniger dramatisch war als der ins Gesicht am 11., erzeugte er weit weniger ausländische Schlagzeilen.", "en": "National press: El País called it a fast sixth encierro but dangerous because of the weekend crowd; its central image was a solitary bull entering the callejón, striking the left-hand boards and knocking over several runners; even so it judged the La Palmosilla animals to have behaved nobly. RTVE framed it as another very fast run in the closing phase of the feria, stressing the speed and the tension as the herd opened up. International coverage was mostly photographic (Reuters and AP distributed images of falls and runner density): as the elbow goring was less dramatic than the 11 July facial wound, it generated far fewer foreign headlines.", "ru": "Национальная пресса: El País назвала забег быстрым шестым, но опасным из-за выходной толпы; центральный образ — одинокий бык, входящий в кальехон, ударяющий по левым доскам и сбивающий нескольких бегущих; и всё же поведение быков Ла-Пальмосильи сочла благородным. RTVE подала это как ещё один очень быстрый забег на финише ферии, подчеркнув скорость и напряжение при раскрытии стада. Международное освещение было в основном фотографическим (Reuters и AP распространили кадры падений и плотности бегущих): поскольку ранение локтя менее драматично, чем ранение лица 11-го, оно дало гораздо меньше зарубежных заголовков.", "ja": "全国紙：El País は速い第6の牛追いだが週末の人出で危険とし、中心的な画は、通路に入り左の板塀に当たって数名の走者をなぎ倒す単独の牛。それでもラ・パルモシーリャの挙動は気高いと評した。RTVE はフェリア終盤のもう一つの非常に速い一走とし、群れが開く際の速度と緊張を強調。国際報道は主に写真（Reuters と AP が転倒や走者密集の画像を配信）。肘の角傷は11日の顔面より劇的でなく、海外の見出しははるかに少なかった。"}});
Object.assign(I18N,{"enc13_dur": {"es": "2 min 34 s", "de": "2 Min 34 s", "en": "2 min 34 s", "ru": "2 мин 34 с", "ja": "2分34秒"}, "enc13_herd": {"es": "Manada muy compacta; lunes con menos gente, con más espacio y carreras más limpias", "de": "Sehr kompakte Herde; ruhigerer Montag mit mehr Platz und saubereren Läufen", "en": "Very compact herd; a quieter Monday with more room and cleaner running", "ru": "Очень плотное стадо; более спокойный понедельник, больше места и чище бег", "ja": "非常にまとまった牛群。人出の少ない月曜で、余裕があり走りもクリーン"}, "enc13_inj": {"es": "8 heridos, ninguno por asta; cinco precisaron traslado (cuatro al Hospital Universitario de Navarra, uno al centro Doctor San Martín)", "de": "8 Verletzte, keiner durch Hornstoß; fünf mussten verlegt werden (vier ins Hospital Universitario de Navarra, einer ins Zentrum Doctor San Martín)", "en": "8 injured, none by horn; five needed transfer (four to the Hospital Universitario de Navarra, one to the Doctor San Martín centre)", "ru": "8 пострадавших, ни одного от рога; пятерых пришлось госпитализировать (четверых в Университетскую больницу Наварры, одного в центр Doctor San Martín)", "ja": "負傷8名、角によるものはなし。5名を搬送（4名をナバラ大学病院、1名をドクター・サン・マルティン施設へ）"}, "enc13_summary": {"es": "El séptimo encierro, con los legendarios Miura, fue de los más limpios y satisfactorios de la feria: rápido, compacto y con excelentes opciones para los corredores expertos. Fue la 58.ª presencia de Miura en Pamplona —más que ninguna otra ganadería— y, de forma inusual, corrió el 13 de julio en lugar de cerrar la feria el 14. El único pero: dentro de la plaza, la manada dio casi una vuelta completa al ruedo antes de entrar en los chiqueros, exponiendo a quienes llegaban del callejón.", "de": "Der siebte Encierro, mit den legendären Miura, war einer der saubersten und befriedigendsten der Feria: schnell, kompakt und mit ausgezeichneten Chancen für erfahrene Läufer. Es war Miuras 58. Auftritt in Pamplona — mehr als jede andere Zucht — und ungewöhnlicherweise lief s
