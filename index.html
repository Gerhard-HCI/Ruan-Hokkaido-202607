<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#A4151F">
<title>Peña Borussia · San Fermín 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F3ECDC; --paper-2:#FAF5EA; --card:#FFFFFF;
  --ink:#211712; --ink-2:#5B4A3E; --ink-3:#8C7B6C; --ink-4:#B4A493;
  --rojo:#C0202E; --rojo-2:#A4151F; --rojo-dk:#7E0F18; --rojo-dk2:#5E0A11;
  --oro:#E0A92E; --oro-dk:#B27E15; --oro-lt:#F6E9C9;
  --verde:#1C7A44; --verde-dk:#125330;
  --negro:#16100D;
  --border:#E5D7BE; --border-2:#EEE3CD;
  --shadow:0 2px 14px rgba(94,10,17,.10),0 1px 3px rgba(94,10,17,.07);
  --r:18px; --r-md:12px; --r-sm:8px;
  --serif:'Spectral',Georgia,'Times New Roman',serif;
  --sans:'Archivo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --poster:'Anton','Archivo',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:var(--sans);cursor:pointer;-webkit-tap-highlight-color:transparent}
img{max-width:100%;display:block}

/* ── HEADER ── */
#app-header{position:fixed;top:0;left:0;right:0;z-index:9999;background:#A4151F;background-image:linear-gradient(157deg,#C0202E 0%,#A4151F 52%,#7E0F18 100%);border-bottom:3px solid var(--oro)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 14px 6px}
.hdr-left{display:flex;align-items:center;gap:9px;min-width:0}
.hdr-mono{height:34px;width:auto;background:#fff;border-radius:7px;padding:3px 4px;box-shadow:0 1px 4px rgba(0,0,0,.25);flex-shrink:0}
.hdr-tt{min-width:0}
.hdr-dest{font-family:var(--sans);font-weight:800;font-size:15px;letter-spacing:1px;color:#fff;line-height:1;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:8.5px;color:rgba(255,255,255,.62);letter-spacing:1.6px;text-transform:uppercase;margin-top:3px}
.hdr-right{display:flex;align-items:center;gap:9px;flex-shrink:0}
.hdr-pamplona{height:30px;width:auto;filter:brightness(0) invert(1);opacity:.92}
.hdr-clock{text-align:right}
#clock{font-family:'Archivo',monospace;font-size:14px;font-weight:600;letter-spacing:1px;color:#fff;display:block}
#day-label{font-size:8px;color:rgba(255,255,255,.6);letter-spacing:.5px;display:block;margin-top:1px;white-space:nowrap}

/* pañuelo stripe */
.panuelo{height:5px;background:#fff;position:relative}
.panuelo::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,var(--rojo) 0 18px,transparent 18px 36px);opacity:.16}

.tab-nav{display:flex;border-top:1px solid rgba(255,255,255,.12);overflow-x:auto;scrollbar-width:none;background:#7E0F18}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;background:none;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.74);font-size:11px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;padding:10px 15px 8px;white-space:nowrap;transition:.16s}
.tab-btn.active{color:#fff;border-bottom-color:var(--oro)}

#main{height:100vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel{display:none;padding:14px 13px 96px;animation:fade .22s ease both}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(min-width:760px){.panel{max-width:880px;margin:0 auto;padding:22px 26px 90px}.tab-nav{padding:0 22px}}

/* ── HERO ── */
.hero{position:relative;border-radius:var(--r);overflow:hidden;margin-bottom:16px;background:#16100D;color:#fff;border:1px solid rgba(0,0,0,.2)}
.hero-bg{position:absolute;inset:0;background:linear-gradient(150deg,#A4151F 0%,#7E0F18 55%,#3A0810 100%)}
.hero-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 82% 12%,rgba(224,169,46,.28) 0%,transparent 46%);mix-blend-mode:screen}
.hero-in{position:relative;padding:24px 20px 20px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--oro);margin-bottom:12px}
.hero-eyebrow::before{content:'';width:20px;height:2px;background:var(--oro)}
.hero h1{font-family:var(--poster);font-size:clamp(40px,12vw,68px);line-height:.9;letter-spacing:.5px;text-transform:uppercase;color:#fff}
.hero h1 .yr{color:var(--oro);display:block;-webkit-text-stroke:0}
.hero-feria{font-family:var(--serif);font-style:italic;font-size:16px;color:rgba(255,255,255,.82);margin:10px 0 2px}
.hero-dates{font-size:12.5px;letter-spacing:.4px;color:rgba(255,255,255,.66)}
.hero-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
.h-chip{font-size:10.5px;font-weight:600;letter-spacing:.3px;padding:5px 11px;border-radius:20px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff}
.h-chip.gold{background:rgba(224,169,46,.2);border-color:rgba(224,169,46,.5);color:#F6E9C9}

.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.6px;color:var(--rojo-2);padding:6px 2px 8px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* legend */
.legend{display:flex;flex-wrap:wrap;gap:7px 14px;padding:11px 14px;background:var(--card);border-radius:var(--r-md);margin-bottom:12px;border:1px solid var(--border-2);box-shadow:var(--shadow)}
.lg{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--ink-2);font-weight:600}
.lg-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.lg-corr{background:var(--rojo)} .lg-rej{background:var(--oro)} .lg-nov{background:var(--verde)} .lg-cena{background:var(--ink)}

/* ── DAY CARD (cartel) ── */
.day{background:var(--card);border-radius:var(--r);margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border-2);animation:rise .3s ease both}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.day.today{border-color:var(--rojo);box-shadow:0 0 0 2px var(--rojo),var(--shadow)}
.day.past{opacity:.6}
.day-head{display:flex;align-items:stretch;gap:0;cursor:pointer;user-select:none}
.day-date{flex-shrink:0;width:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 6px;color:#fff;position:relative}
.day-date.k-corr{background:linear-gradient(160deg,#C0202E,#8E1119)}
.day-date.k-rej{background:linear-gradient(160deg,#E0A92E,#B27E15)}
.day-date.k-nov{background:linear-gradient(160deg,#1C7A44,#125330)}
.dd-dow{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:.85}
.dd-num{font-family:var(--poster);font-size:30px;line-height:.92;letter-spacing:.5px}
.dd-mon{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;opacity:.8}
.day-head-main{flex:1;min-width:0;padding:12px 13px;display:flex;align-items:center;gap:10px}
.dhm-tt{flex:1;min-width:0}
.dhm-kind{font-size:9.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-4)}
.dhm-gan{font-family:var(--poster);font-size:21px;line-height:1;letter-spacing:.4px;text-transform:uppercase;color:var(--ink);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dhm-meta{font-size:11px;color:var(--ink-3);margin-top:5px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.pill-today{font-size:9px;font-weight:800;letter-spacing:.5px;background:var(--rojo);color:#fff;padding:2px 7px;border-radius:20px;text-transform:uppercase}
.chev{color:var(--ink-4);font-size:13px;flex-shrink:0;transition:transform .28s cubic-bezier(.4,0,.2,1);align-self:center;padding-right:13px}
.day.open .chev{transform:rotate(180deg)}
.day-body{max-height:0;overflow:hidden;transition:max-height .42s cubic-bezier(.4,0,.2,1)}
.day.open .day-body{max-height:9000px}
.day-body-in{padding:2px 14px 16px}

/* block */
.blk{border-radius:var(--r-md);border:1px solid var(--border-2);margin-top:11px;overflow:hidden}
.blk-head{display:flex;align-items:center;gap:9px;padding:10px 13px;background:var(--paper-2)}
.blk-ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.bi-apar{background:var(--oro-lt);color:var(--oro-dk)}
.bi-corr{background:#F6DADD;color:var(--rojo-dk)}
.bi-gan{background:#EADBC0;color:var(--oro-dk)}
.bi-mat{background:#F6DADD;color:var(--rojo-dk)}
.bi-cena{background:#E3EFE7;color:var(--verde-dk)}
.blk-tt{flex:1;min-width:0}
.blk-name{font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.15}
.blk-time{font-size:11px;color:var(--ink-3);margin-top:1px}
.blk-time b{color:var(--rojo-2);font-weight:700}
.blk-body{padding:11px 13px}

.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.tag{font-size:9.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:3px 8px;border-radius:5px;background:var(--paper);border:1px solid var(--border);color:var(--ink-2)}
.tag.gold{background:var(--oro-lt);border-color:#E7D2A0;color:var(--oro-dk)}
.tag.red{background:#F6DADD;border-color:#EDBDC2;color:var(--rojo-dk)}
.tag.green{background:#E3EFE7;border-color:#BFDDC9;color:var(--verde-dk)}

.essay{font-family:var(--serif);font-size:13.5px;line-height:1.62;color:var(--ink-2)}
.essay strong{color:var(--ink);font-weight:600}

.terna{list-style:none;margin:0 0 11px;padding:0;border-top:1px solid var(--border-2);border-bottom:1px solid var(--border-2)}
.terna li{display:flex;align-items:baseline;gap:10px;padding:7px 2px;border-bottom:1px solid var(--border-2);font-size:14px}
.terna li:last-child{border-bottom:none}
.terna .tn{font-family:var(--poster);font-size:13px;color:var(--rojo-2);width:18px;flex-shrink:0;text-align:center}
.terna .tname{font-weight:600;color:var(--ink)}
.terna .torigin{font-size:11px;color:var(--ink-3);font-style:italic;margin-left:auto;font-family:var(--serif)}

.note{font-size:11.5px;color:var(--ink-2);line-height:1.5;background:var(--oro-lt);border-left:3px solid var(--oro);border-radius:var(--r-sm);padding:8px 11px;margin-bottom:9px}

.where{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-2);margin-bottom:9px}
.where .pin{color:var(--rojo-2)}
.acts{display:flex;gap:6px;flex-wrap:wrap}
.act{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 12px;border-radius:var(--r-sm);font-size:11.5px;font-weight:600;border:1px solid var(--border);background:#fff;color:var(--ink-2);min-height:36px;flex:1}
.act:active{transform:scale(.97)}
.act.primary{background:var(--rojo-2);color:#fff;border-color:var(--rojo-2)}
.act.gold{background:var(--oro);color:#3a2906;border-color:var(--oro-dk)}

.diners{font-size:12px;color:var(--ink-2);margin:2px 0 9px;line-height:1.5}
.diners b{color:var(--ink)}
.cena-multi{border-top:1px dashed var(--border);margin-top:11px;padding-top:11px}

/* ── CENAS tab ── */
.cena-card{background:var(--card);border-radius:var(--r-md);border:1px solid var(--border-2);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.cc-head{display:flex;align-items:center;gap:11px;padding:13px 14px}
.cc-date{flex-shrink:0;width:46px;text-align:center}
.cc-dow{font-size:8.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-4)}
.cc-num{font-family:var(--poster);font-size:24px;line-height:1;color:var(--rojo-2)}
.cc-info{flex:1;min-width:0}
.cc-name{font-size:15px;font-weight:700;color:var(--ink)}
.cc-meta{font-size:11px;color:var(--ink-3);margin-top:2px}
.cc-time{font-size:13px;font-weight:700;color:var(--rojo-2);flex-shrink:0}
.cc-foot{display:flex;align-items:center;gap:8px;padding:0 14px 13px;font-size:11.5px;color:var(--ink-2)}
.cc-foot .addr{flex:1;min-width:0}
.cc-map{padding:7px 12px;border-radius:var(--r-sm);background:var(--rojo-2);color:#fff;font-size:11px;font-weight:600;flex-shrink:0}

/* ── CARTEL / ABONO tab ── */
.poster-wrap{background:var(--card);border-radius:var(--r);border:1px solid var(--border-2);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.poster-wrap img{width:100%;background:#1c1410}
.poster-cap{padding:11px 14px;font-size:11.5px;color:var(--ink-3);font-style:italic;font-family:var(--serif)}
.info-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border-2);box-shadow:var(--shadow);padding:16px 16px 6px;margin-bottom:12px}
.info-card h3{font-family:var(--poster);font-size:18px;letter-spacing:.4px;text-transform:uppercase;color:var(--ink);margin-bottom:3px}
.info-card .sub{font-size:11.5px;color:var(--ink-3);margin-bottom:12px}
.price-row{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--border-2)}
.price-row:last-child{border-bottom:none}
.pr-l{font-size:13px;color:var(--ink-2)}
.pr-l b{color:var(--ink);font-weight:700}
.pr-v{font-family:var(--poster);font-size:20px;color:var(--rojo-2)}
.pr-v small{font-size:11px;font-family:var(--sans);color:var(--ink-3);font-weight:500}
.ilist{list-style:none;margin:4px 0 0}
.ilist li{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-2);font-size:12.5px;line-height:1.5;color:var(--ink-2)}
.ilist li:last-child{border-bottom:none}
.ilist .em{font-size:16px;flex-shrink:0}
.ilist b{color:var(--ink)}

.about{font-family:var(--serif);font-size:13.5px;line-height:1.65;color:var(--ink-2)}
.about strong{color:var(--ink);font-weight:600}

/* footer PB badge */
#pb-badge{position:fixed;right:12px;bottom:14px;z-index:9998;background:#fff;border-radius:12px;padding:7px 8px;box-shadow:0 4px 16px rgba(94,10,17,.22);border:1px solid var(--border)}
#pb-badge img{height:44px;width:auto}

#toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(14px);background:rgba(33,23,18,.94);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.22s;z-index:10000;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(prefers-color-scheme:dark){
  :root{--paper:#15100C;--paper-2:#1D1610;--card:#1B1510;--ink:#F1E7D8;--ink-2:#C2B09B;--ink-3:#8C7B6C;--ink-4:#5F5141;--border:#33281C;--border-2:#2A2117;--oro-lt:#2A2008}
}

/* ── language bar ── */
.nav-row{display:flex;align-items:stretch;background:#7E0F18}
.nav-row .tab-nav{flex:1;border-top:none}
.lang-bar{display:flex;align-items:center;gap:2px;padding:0 6px;border-left:1px solid rgba(255,255,255,.16);background:#7E0F18;flex-shrink:0}
.lang-btn{font-size:20px;line-height:1;padding:8px 5px;background:none;border:none;border-bottom:3px solid transparent;opacity:.85;transition:.15s}
.lang-btn.active{opacity:1;border-bottom-color:var(--oro);background:rgba(224,169,46,.16)}
.lang-btn:active{transform:scale(.88)}

/* ── La Peña hoy strip ── */
.penya-strip{background:linear-gradient(180deg,#fff,#FBF4E7);border:1px solid var(--border-2);border-radius:var(--r-md);padding:11px 12px;margin-top:11px}
.ps-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ps-ico{width:26px;height:26px;border-radius:7px;background:#F6DADD;color:var(--rojo-dk);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ps-title{font-size:11px;font-weight:800;color:var(--rojo-2);letter-spacing:1px;text-transform:uppercase}
.ps-free{margin-left:auto;font-size:10px;font-weight:700;color:var(--verde-dk);background:#E3EFE7;border:1px solid #BFDDC9;border-radius:20px;padding:3px 9px;white-space:nowrap}
.ps-people{display:flex;flex-wrap:wrap;gap:5px}
.av-chip{display:inline-flex;align-items:center;gap:6px;background:var(--paper);border:1px solid var(--border);border-radius:20px;padding:3px 11px 3px 3px;font-size:11.5px;font-weight:600;color:var(--ink)}
.av-ini{width:20px;height:20px;border-radius:50%;background:var(--rojo-2);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ps-none{font-size:11.5px;color:var(--ink-3);font-style:italic}

/* ── seating matrix ── */
.seat-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border-2);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px}
.seat-card-h{padding:15px 16px 12px}
.seat-card-h h3{font-family:var(--poster);font-size:18px;letter-spacing:.4px;text-transform:uppercase;color:var(--ink);line-height:1.05}
.seat-card-h .sub{font-size:11.5px;color:var(--ink-3);margin-top:3px}
.seat-legend{display:flex;flex-wrap:wrap;gap:6px 13px;padding:0 16px 12px}
.sl{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--ink-2);font-weight:600}
.sl-sw{width:13px;height:13px;border-radius:3px;flex-shrink:0;border:1px solid rgba(0,0,0,.06)}
.sl-occ{background:#C0202E}
.sl-free{background:repeating-linear-gradient(45deg,#fff,#fff 4px,#F0E2C8 4px,#F0E2C8 8px)}
.sl-av{background:#1C7A44}
.seat-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-top:1px solid var(--border-2)}
.seat-grid{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%}
.seat-grid th,.seat-grid td{padding:0;text-align:center;margin:0}
.seat-grid thead th{position:sticky;top:0;background:var(--paper-2);color:var(--ink-2);font-weight:700;font-size:10px;padding:6px 4px;border-bottom:1px solid var(--border);min-width:54px;z-index:2;line-height:1.05}
.seat-grid thead th small{display:block;font-size:8px;color:var(--ink-4);font-weight:600;margin-top:1px}
.seat-grid thead th.corner{position:sticky;left:0;z-index:4;text-align:left;padding-left:12px;min-width:128px;max-width:128px}
.seat-holder{position:sticky;left:0;background:var(--card);text-align:left;padding:7px 9px;border-bottom:1px solid var(--border-2);border-right:1px solid var(--border);min-width:128px;max-width:128px;z-index:1}
.seat-holder .sn{font-size:8px;color:var(--ink-4);font-weight:800;letter-spacing:.5px}
.seat-holder .sh{font-size:11.5px;font-weight:600;color:var(--ink);line-height:1.12;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.seat-holder.r-av .sh{color:var(--verde-dk)}
.seat-holder.r-nap{background:#FCEFEF}
.seat-cell{border-bottom:1px solid var(--border-2);border-right:1px solid var(--border-2);height:38px;min-width:54px;font-size:9.5px;font-weight:700;padding:2px;vertical-align:middle}
.sc-occ{background:#C0202E;color:#fff}
.sc-nap{background:#CE5560;color:#fff;font-size:8px;opacity:.92}
.sc-free{background:repeating-linear-gradient(45deg,#fff,#fff 5px,#F4E7CE 5px,#F4E7CE 10px);color:var(--ink-4)}
.sc-av{background:#1C7A44;color:#fff;font-size:8px}
.seat-grid tbody tr.is-today td{box-shadow:inset 0 0 0 9999px rgba(224,169,46,.0)}
.seat-grid thead th.dh.is-today{background:var(--oro);color:#3a2906}

 { iso:"2026-07-05", dow:"Dom", num:"5", mon:"Jul", kind:"nov", kindLabel:"Novillada picada",

   ganEssay:"<strong>Pincha</strong> es uno de los dos hierros navarros del abono y el único de la novillada. Vacada de Lodosa, en la Ribera del Ebro, representa la modesta pero querida presencia local en una feria dominada por las grandes casas andaluzas y castellanas. Abre el ciclo, el domingo del chupinazo, con una novillada picada —utreros de tres años para novilleros con picadores—, festejo que sirve de pórtico a la Feria del Toro y de banco de pruebas para los valores jóvenes. El aficionado navarro arropa siempre a «los de casa», y ver el hierro de Pincha en el ruedo de la Misericordia tiene un punto de orgullo de tierra. Sin el cartel de relumbrón de las tardes mayores, la novillada ofrece la verdad desnuda del toreo en formación: tres novilleros midiéndose con utreros serios ante una de las plazas más exigentes y entendidas del mundo. Es la tarde para descubrir nombres antes de que lleguen a figuras, en un ambiente más relajado y luminoso —empieza a las 20:00 h— que abre, festivo, los diez días de toros de San Fermín 2026.",

 { iso:"2026-07-06", dow:"Lun", num:"6", mon:"Jul", kind:"rej", kindLabel:"Corrida de rejones",

   ganEssay:"La corrida de rejones se lidia con toros de <strong>El Capea</strong> y <strong>Carmen Lorenzo</strong>, dos hierros hermanos de la familia Gutiérrez Lorenzo, propiedad del maestro Pedro Gutiérrez Moya, «El Niño de la Capea», figura del toreo de los años 70 y 80. Pastan en la dehesa charra de San Pelayo de Guareña (Salamanca) y atesoran un raro encaste Murube-Urquijo, sangre histórica y casi extinguida que el ganadero rescató por su nobleza, su galope templado y su predisposición al lucimiento. Precisamente esas cualidades —movilidad, ritmo, fijeza y un son que invita a la doma— hacen del toro de Capea un animal idóneo para el rejoneo, muy demandado por los caballeros de primera fila. Carmen Lorenzo fue registrada en honor a la esposa del ganadero; El Capea (antes Pedro y Verónica Gutiérrez Lorenzo) ha ido ganando peso también en festejos a pie. En Pamplona, su corrida del 6 de julio —tarde del chupinazo— ofrece toros nobles y entregados que permiten al toreo a caballo desplegar toda su plástica sobre la arena de la Monumental.",

 { iso:"2026-07-07", dow:"Mar", num:"7", mon:"Jul", kind:"corr", kindLabel:"Corrida de toros · Día de San Fermín",

   corrTime:"18:30",
   ganEssay:"<strong>Fuente Ymbro</strong> es una de las casas más sólidas y repetidas del toreo contemporáneo y un viejo conocido de Pamplona, donde llegó a lidiar catorce años consecutivos. La creó en 1996 el cordobés Ricardo Gallardo con vacas y sementales comprados a Borja Domecq, propietario entonces de Jandilla, de modo que su sangre es Juan Pedro Domecq pura por vía jandillista. Sobre esa base, Gallardo —discípulo y amigo de Domecq— ha cincelado un toro de bravura encastada, con movilidad, fondo y repetición, que «no regala nada» pero que permite el gran triunfo cuando se le hacen las cosas bien. Pastan en San José del Valle (Cádiz) y son reses armónicas, bien rematadas y astifinas. Sus novilladas gozan, además, de enorme prestigio como banco de pruebas. En la Feria del Toro, su hierro verde es de los más demandados por el juego que ofrece en el ruedo de la Misericordia. Anunciada el día grande de San Fermín, el 7 de julio, la corrida abre las ocho tardes mayores del abono con la promesa de un toro encastado y noble a partes iguales, idóneo para que las figuras se luzcan sin renunciar a la emoción.",

   matEssay:"Cartel que combina poder consagrado y juventud emergente. <strong>Daniel Luque</strong>, sevillano de Gerena, es hoy uno de los toreros más poderosos y regulares del escalafón: madurez, técnica honda y una versión plena que en los últimos años le ha colocado entre las grandes figuras, aunque su entrega no siempre haya tenido en Pamplona la recompensa merecida. Frente a él, dos valores que se presentan en la Monumental. <strong>Víctor Hernández</strong>, madrileño de la Alcarria, es uno de los nombres revelación del momento: tras una temporada de tres tardes en San Isidro 2026, llega avalado por la crítica como uno de los toreros jóvenes con más proyección. <strong>Aarón Palacio</strong>, zaragozano jovencísimo, deslumbró primero como novillero y confirma ahora su salto, aupado por el apoyo de figuras como Morante. La corrida del 7 de julio, día de San Fermín, enfrenta así el oficio contrastado de Luque con el hambre de dos espadas que buscan abrirse hueco en la feria más mediática del verano, ante una afición que premia la verdad.",

   ganName:"Victoriano del Río", ganTags:["Encaste Domecq","Madrid","+ Toros de Cortés"],
   corrTime:"18:30",
   ganEssay:"<strong>Victoriano del Río</strong> —que en Pamplona lidia junto a su segundo hierro, <strong>Toros de Cortés</strong>— es una de las ganaderías predilectas de las figuras del toreo. El empresario madrileño Victoriano del Río Cortés rehízo la vacada en 1985 sobre encaste Domecq, con aportes de Jandilla, Torrestrella y otras líneas, hasta lograr un tipo de toro propio: bravo, encastado, con clase, prontitud y, sobre todo, transmisión. Pasta en Guadalix de la Sierra (Madrid), comarca ganadera de pastos finos, y la casa la dirigen hoy Victoriano y sus hijos. Ante sus toros han cuajado faenas memorables El Juli, Manzanares, Talavante, Morante o Roca Rey, prueba de su regularidad y fiabilidad. Es, en la jerga, un hierro «torerista»: un toro que, sin renunciar a la casta, está pensado para que el gran torero brille. En San Fermín, su corrida del 9 de julio es de las de relumbrón del abono, reforzada por un cartel de máximas figuras. Si el animal humilla y repite como suele, la tarde promete ser una de las cumbres artísticas de la feria, con un público entregado y la Puerta Grande de la Misericordia como horizonte.",
   terna:[["Alejandro Talavante","Extremadura"],["Andrés Roca Rey","Perú · 1.ª de 2"],["David de Miranda","Huelva · se presenta"]],
   matEssay:"Una de las grandes tardes del abono por nombres. <strong>Alejandro Talavante</strong>, extremeño, es uno de los toreros más dotados y personales de su generación: tras su regreso a los ruedos firma un momento de madurez artística que le mantiene en lo más alto del escalafón. <strong>Andrés Roca Rey</strong>, el peruano que es hoy la gran figura internacional del toreo, hace el primero de sus dos paseíllos —es el único anunciado dos tardes—: valor arrollador, dominio y una conexión con el público que llena plazas en todo el mundo; en Pamplona ha abierto la Puerta Grande en varias ocasiones. <strong>David de Miranda</strong>, onubense, debuta en la Monumental tras ser proclamado triunfador de la Feria de Abril de Sevilla 2026, un aval enorme que le abre por fin la gran puerta de Pamplona. Con toros de Victoriano del Río —hierro idóneo para el lucimiento— el cartel del 9 de julio reúne arte (Talavante), poder y entrega (Roca Rey) y la irrupción de un valor en alza (De Miranda). Es, sobre el papel, una de las citas con más tirón y mayores expectativas de toda la feria.",
   matLabel:"Matadores",
   cenas:[ {name:"Enekorri",time:"22:30",pax:"Gerhard, Tomoko, Peter, Elena, Achim, Günter, Puri (7)",addr:"C. de Tudela 14",url:"https://www.google.com/maps/search/?api=1&query=Enekorri&query_place_id=ChIJw6LJI1aSUA0RHv9dQeyv3bs"} ] },

 { iso:"2026-07-10", dow:"Vie", num:"10", mon:"Jul", kind:"corr", kindLabel:"Corrida de toros",
   ganName:"Álvaro Núñez", ganTags:["Encaste Núñez","Cádiz","Hierro joven"],
   corrTime:"18:30",
   ganEssay:"<strong>Álvaro Núñez</strong> es la divisa más joven del abono y una de sus grandes atracciones recientes. El ganadero Álvaro Núñez, de la histórica casa Núñez, afinó esta vacada de encaste Núñez en sus fincas del entorno de Vejer y Tarifa (Cádiz) y la estrenó en la Feria del Toro en 2025, con un éxito inmediato: con este hierro firmó Morante de la Puebla su primera Puerta Grande en Pamplona, motivo por el que el maestro repite ahora con esta divisa. El toro de Núñez se mueve dentro de la órbita del encaste Núñez —variado de pelajes, con clase y nobleza—, buscando un animal que combine presencia, bravura y recorrido para el lucimiento de las figuras. Su rápida consagración confirma el olfato de la Comisión Taurina de la Casa de Misericordia, siempre atenta a incorporar hierros con tirón sin renunciar al trapío que exige Pamplona. La tarde del 10 de julio, con Morante de cabeza de cartel, es una de las más esperadas y artísticas del serial: una ganadería emergente que ya ha demostrado que puede propiciar la gran faena en el ruedo más universal del toreo.",
   terna:[["Morante de la Puebla","Sevilla"],["Borja Jiménez","Sevilla · Espartinas"],["Pablo Aguado","Sevilla"]],
   matEssay:"Tarde sevillana y de máximo arte. <strong>José Antonio Morante de la Puebla</strong> es el torero más influyente y personal del siglo XXI, un artista de concepto puro capaz de detener el tiempo; su regreso a San Fermín, donde el año pasado abrió la Puerta Grande con Álvaro Núñez, es uno de los grandes acontecimientos del abono. Le acompañan dos paisanos sevillanos de hondísimo gusto. <strong>Pablo Aguado</strong> encarna el toreo de cadencia, temple y pureza, capaz de levantar a los tendidos cuando el toro se presta a su clasicismo. <strong>Borja Jiménez</strong>, de Espartinas, vive su momento de explosión: regular, valiente y poderoso, ha pegado en 2025-2026 el golpe definitivo para instalarse entre las figuras, con triunfos sonados en Sevilla. Con los toros nobles y de clase de Álvaro Núñez, el cartel del 10 de julio reúne a tres toreros de la escuela sevillana —arte, temple y entrega— en una de las tardes con mayor carga estética de la feria. Si el toro colabora, la cita puede convertirse en la cumbre artística de San Fermín 2026.",
   matLabel:"Matadores",
   cenas:[
     {name:"Desayuno · Sociedad Gastronómica Napardi",time:"10:00 (llegar 09:45)",pax:"Peña + invitados Miguel Ángel, Luci, José María Sevilla (10)",addr:"C. Jarauta 2",url:"https://maps.app.goo.gl/C8xJMpV8Cr4X1dYLA?g_st=ic",breakfast:true},

 { iso:"2026-07-11", dow:"Sáb", num:"11", mon:"Jul", kind:"corr", kindLabel:"Corrida de toros",
   ganName:"José Escolar Gil", ganTags:["Encaste Albaserrada","Ávila","Torista · dura"],
   corrTime:"18:30",
   ganEssay:"<strong>José Escolar Gil</strong> es el gran bastión torista del abono. Fundó su ganadería en 1981 con reses de Victorino Martín, conservando únicamente la sangre del encaste Albaserrada, una de las ramas más particulares, serias y definidas del toro bravo. Pasta en Lanzahíta (Ávila) y da un toro de presencia imponente, cabeza alargada de «hocico de rata», cornamentas desarrolladas y ofensivas y pelajes predominantemente cárdenos. Es una corrida dura, encastada y exigente, que «no busca lo bueno, busca la verdad», en palabras del propio ganadero, y que se ha hecho querer por la afición más rigurosa de Madrid, Francia y Pamplona, donde su encaste encaja como un guante con el gusto navarro. Escolar no es hierro que pidan las figuras: es el toro del torero de raza, el que exige lidia, técnica y compromiso, y el que premia al valiente. En tiempos de excesiva suavidad en muchas vacadas, representa la resistencia a la domesticación del toro bravo. Su tarde, el 11 de julio, es una de las marcadas para el aficionado torista: lidia áspera, terrenos comprometidos y la épica del que se la juega de verdad ante un animal íntegro.",
   terna:[["Antonio Ferrera","Extremadura"],["Juan de Castilla","Colombia"],["Isaac Fonseca","México"]],
   matEssay:"Cartel de toreros de fondo para una corrida dura. <strong>Antonio Ferrera</strong>, extremeño, es uno de los matadores más completos, valientes y personales de las últimas décadas, especialista reconocido en las ganaderías de más respeto: ante el Escolar, su oficio y su capacidad lidiadora son garantía. Junto a él, dos espadas americanos que encarnan la pujanza de la torería del otro lado del Atlántico. <strong>Juan de Castilla</strong>, colombiano, «llegó a Pamplona para quedarse»: debutó cortando oreja y ha confirmado una tauromaquia de autenticidad silenciosa y esfuerzo, idónea para el toro encastado. <strong>Isaac Fonseca</strong>, mexicano, representa a la nueva generación americana capaz de asumir sin complejos el compromiso frente al toro íntegro; tras lesiones que le han frenado en ediciones anteriores, quiere reivindicarse en la tierra que considera ejemplo. La terna compone uno de los carteles conceptualmente más densos de la feria: nada de toreo decorativo ni triunfalismo fácil, sino lidia exigente y lectura ganadera compleja, el escenario donde un torero puede legitimarse ante la afición más entendida del verano europeo.",
   matLabel:"Matadores",
   cenas:[ {name:"Asador Olaverri",time:"22:30",pax:"Gerhard, Tomoko, Peter, Elena, Achim, Günter, Puri, Tassilo +4 (12)",addr:"Calle de Sta Marta 4",url:"https://www.google.com/maps/search/?api=1&query=Asador%20Olaverri&query_place_id=ChIJRasmt6yTUA0R2WEG6LWroD0"} ] },

 { iso:"2026-07-12", dow:"Dom", num:"12", mon:"Jul", kind:"corr", kindLabel:"Corrida de toros",
   ganName:"La Palmosilla", ganTags:["Encaste Domecq · Osborne","Cádiz · Tarifa"],
   corrTime:"18:30",
   ganEssay:"<strong>La Palmosilla</strong> es uno de los descubrimientos recientes de Pamplona. La creó en 1996 la familia Núñez —José Javier Núñez Cervera y su hijo Javier— con vacas y sementales de Juan Pedro Domecq y de Núñez del Cuvillo (rama Osborne), sobre un apellido ganadero, el de los Núñez de Tarifa, con más de dos siglos y medio de historia. Pasta en Tarifa (Cádiz) y da un toro de encaste Domecq con gran policromía —negros, colorados, castaños, ensabanados—, imponente, poderoso, ancho de pecho y variado de hechuras. Debutó en la Feria del Toro en 2019 sustituyendo nada menos que a Fuente Ymbro, y el éxito fue inmediato: aquel año firmó el toro más bravo de la feria (Premio Carriquiri) y en 2022 se llevó el premio a la corrida más completa. Desde entonces no ha faltado, convirtiendo San Fermín en su gran escaparate. Sus toros destacan por velocidad, movilidad y buen juego, tanto en el encierro como en el ruedo. La tarde del 12 de julio ofrece un hierro joven pero ya contrastado, que combina la pureza del encaste Domecq con una evolución moderna y que permite soñar con la gran faena.",
   terna:[["Fortes","Málaga · repite"],["Fernando Adrián","Madrid · P. Grande 2025"],["Samuel Navalón","Valencia · se presenta"]],
   matEssay:"Cartel que mezcla veteranía con valor y juventud triunfadora. <strong>Saúl Jiménez Fortes</strong>, malagueño, es un torero de raza y valor extremo, especialista en jugarse la vida ante las ganaderías más serias; repite con La Palmosilla tras su triunfo del año pasado, cuando se ganó de nuevo el cariño de Pamplona. <strong>Fernando Adrián</strong>, madrileño, fue uno de los grandes triunfadores de San Fermín 2025 —abrió la Puerta Grande— y regresa avalado por aquella gesta y por una temporada de afirmación que le ha llevado también a destacar en San Isidro. <strong>Samuel Navalón</strong>, valenciano jovencísimo, debuta en la Monumental: triunfador de las Fallas y recién doctorado, llega como uno de los nombres con más proyección del escalafón, después de quedar inédito en la novillada que la lluvia suspendió en 2024. Con los toros móviles y bravos de La Palmosilla, el cartel del 12 de julio enfrenta la entrega sin medida de Fortes, la confianza del triunfador Adrián y el hambre del debutante Navalón. Una tarde con ingredientes para la emoción, en la que dos triunfadores recientes buscan repetir y un joven valor sueña con su primera gran tarde sanferminera.",
   matLabel:"Matadores",
   cenas:[ {name:"Restaurante Arostegui",time:"22:30",pax:"Gerhard, Tomoko, Peter, Elena, Günter, Puri (6)",addr:"C. de Juan de Labrit 19",url:"https://www.google.com/maps/search/?api=1&query=Restaurante%20Arostegui&query_place_id=ChIJIU_28fiTUA0RvYuFKfpqkow"} ] },

 { iso:"2026-07-13", dow:"Lun", num:"13", mon:"Jul", kind:"corr", kindLabel:"Corrida de toros · La temida",
   ganName:"Miura", ganTags:["Encaste propio","Sevilla · Zahariche","Leyenda"],
   corrTime:"18:30",
   ganEssay:"<strong>Miura</strong> es la leyenda viva del toreo. Fundada en 1842 por Juan Miura en Sevilla, cría en la finca Zahariche (Lora del Río) un toro único, de encaste propio formado con sangres hoy desaparecidas: más alto, más largo, astifino y con «sentido» —ese aprendizaje durante la lidia que lo hace tan peligroso—. Su divisa verde y negra impone respeto; la frase «los Miura matan más toreros», popularizada tras la muerte de Manolete en 1947, forjó una leyenda negra que paradójicamente engrandeció el hierro. Es la ganadería más laureada de la Feria del Toro y la que más veces ha pisado el encierro de Pamplona, donde tradicionalmente cerraba el ciclo el último día. En 2026, como novedad, la corrida de Miura no clausura la feria sino que se adelanta al lunes 13 de julio. Ponerse delante de un Miura ha sido siempre asunto de toreros sobrados de agallas, por su historia, su sangre y su particular comportamiento. Hoy los hermanos Antonio y Eduardo Miura mantienen el criterio de siempre: personalidad, integridad y casta, sin concesiones ni modas. Su tarde es una de las citas mayores del abono, esperada con admiración y temor a partes iguales.",
   terna:[["Manuel Escribano","Sevilla"],["Pepe Moral","Sevilla · Los Palacios"],["Jesús Enrique Colombo","Venezuela · ídolo local"]],
   matEssay:"Terna de especialistas para el hierro más temido. <strong>Manuel Escribano</strong>, sevillano, es uno de los toreros más valientes y específicos del escalafón ante las ganaderías duras: banderillero de poder y matador de arrojo, es un fijo de las corridas de respeto y un nombre habitual de los Miura en Pamplona. <strong>Pepe Moral</strong>, de Los Palacios (Sevilla), ha forjado una trayectoria de entrega y solvencia ante el toro serio; el año pasado cortó con Cebada Gago en San Fermín, prueba de su buen momento frente al encaste exigente. Pero el ídolo popular de la tarde es <strong>Jesús Enrique Colombo</strong>, venezolano de San Cristóbal e hijo de matador, convertido en uno de los favoritos de Pamplona: en 2024 salió a hombros tras cortar dos orejas a los Miura, hazaña que lo inscribió en la estela de los grandes toreros venezolanos de la Monumental. Su conexión emocional con el tendido es total. Con los toros de Zahariche, el cartel del 13 de julio reúne a tres espadas que no rehúyen el compromiso, en una de las tardes de más casta y dramatismo del abono: la cita en la que el toro puede, él solo, cambiar el rumbo de la feria.",
   matLabel:"Matadores",
   cenas:[ {name:"Restaurante Alhambra",time:"22:30",pax:"Gerhard, Tomoko, Peter, Elena, Günter, Puri (6)",addr:"C. de Francisco Bergamín 7",url:"https://www.google.com/maps/search/?api=1&query=Restaurante%20Alhambra&query_place_id=ChIJE8KW8VWSUA0RRQu5i_Fyqf0"} ] },

 { iso:"2026-07-14", dow:"Mar", num:"14", mon:"Jul", kind:"corr", kindLabel:"Corrida de toros · Cierre de feria",
   ganName:"Jandilla", ganTags:["Encaste Domecq","Badajoz","+ Vegahermosa"],
   corrTime:"18:30",
   ganEssay:"<strong>Jandilla</strong> cierra la Feria del Toro 2026. Heredera directa de la casa fundada por Juan Pedro Domecq en 1930, fue reformulada en los años 80 por Borja Domecq Solís hasta convertirse en uno de los pilares del encaste Domecq y en la base genética de innumerables ganaderías actuales (Fuente Ymbro, Victoriano del Río, El Pilar…). En Pamplona lidia junto a su hierro asociado, <strong>Vegahermosa</strong>. Da un toro de alzada media, cuello largo que le permite humillar, nobleza con fondo de bravura y, sobre todo, gran transmisión y durabilidad en el último tercio: casta con clase, el toro que embiste con emoción y hace rugir los tendidos. Borja Domecq aprendió de los viejos creadores de la Feria del Toro que «el toro de Pamplona no se hace, nace» con el tipo y las hechuras que la plaza exige, y de ahí el trapío de sus corridas. La casa es un clásico de San Fermín desde los años 90. En 2026 le corresponde el honor de poner el broche al abono el martes 14 de julio, con un cartel de tirón pensado para mantener vivo el interés hasta el final: la última gran tarde de toros antes del Pobre de Mí.",
   terna:[["Juan Ortega","Sevilla"],["Andrés Roca Rey","Perú · 2.ª de 2"],["Tomás Rufo","Toledo"]],
   matEssay:"Cartel de cierre con tres figuras y máximo tirón. <strong>Juan Ortega</strong>, sevillano, es uno de los toreros más elegantes y artísticos del escalafón, de concepto clásico y temple exquisito; atraviesa un momento dulce que en 2026 lo ha situado al frente del escalafón por número de tardes. <strong>Andrés Roca Rey</strong>, la gran figura mundial del toreo, hace su segundo paseíllo de la feria —es el único anunciado dos tardes— y pone su valor, su dominio y su electricidad al servicio del broche final: en Pamplona ha abierto varias veces la Puerta Grande y es garantía de entrega. <strong>Tomás Rufo</strong>, toledano, completa una terna de lujo: torero serio, poderoso y en plena consagración, ha sido de los triunfadores recientes de San Fermín y aporta el clasicismo de su muleta. Con los toros de Jandilla y Vegahermosa —nobleza con casta, ideales para el lucimiento—, el cartel del 14 de julio busca cerrar la feria por todo lo alto. Es la traca final del abono: tres espadas de primera fila ante un hierro histórico, en una tarde pensada para que San Fermín 2026 se despida con la Puerta Grande como objetivo.",
   matLabel:"Matadores",
   cenas:[ {name:"Restaurante Kabo · comida",time:"13:45",pax:"Gerhard, Tomoko, Tassilo +4 (7)",addr:"Av. de Zaragoza 10",url:"https://www.google.com/maps/search/?api=1&query=Restaurante%20Kabo&query_place_id=ChIJ5yEZ9BiTUA0RHouai8D0wS4",lunch:true} ] }
];

grün) ist noch frei: Die Peña würde sich freuen, wenn ein <b>Napardi<\/b>-Mitglied es übernähme. Einzelkarten 71 €/Tag.", "en": "<b>White<\/b> cells are seats free that day (the holder isn't attending) and could be offered to guests. <b>Seat 8<\/b> (green) is still available: the Peña would love a <b>Napardi<\/b> member to take it. Single tickets €71/day.", "ru": "<b>Белые<\/b> клетки — свободные в этот день места (владелец не идёт), их можно предложить гостям. <b>Абоно 8<\/b> (зелёное) ещё свободно: Пенья была бы рада, если бы его взял кто-то из <b>Napardi<\/b>. Разовые билеты 71 €/день.", "ja": "<b>白<\/b>のマスはその日空いている席（名義人が不在）で、ゲストに提供できます。<b>8番<\/b>（緑）はまだ空きがあり、<b>Napardi<\/b> の方が取得してくださると嬉しいです。単券は71 €/日。"}, "cenas_eyebrow": {"es": "Peña Borussia · Plan 2026", "de": "Peña Borussia · Plan 2026", "en": "Peña Borussia · 2026 Plan", "ru": "Peña Borussia · План 2026", "ja": "ペーニャ・ボルシア · 2026計画"}, "cenas_title": {"es": "Cenas y comidas", "de": "Essen &amp; Trinken", "en": "Meals &amp; dinners", "ru": "Обеды и ужины", "ja": "食事 &amp; 会食"}, "cenas_sub": {"es": "Reservas de la semana · 8 – 14 de julio", "de": "Reservierungen der Woche · 8.–14. Juli", "en": "The week's bookings · 8–14 July", "ru": "Брони недели · 8–14 июля", "ja": "今週の予約 · 7月8〜14日"}, "cenas_note1": {"es": "El <b>desayuno en Napardi<\/b> (Vie 10, 10:00) reúne a la Peña con los invitados <b>Miguel Ángel, Luci<\/b> y <b>José María Sevilla<\/b> — 10 comensales. Conviene llegar a las 09:45.", "de": "Das <b>Frühstück bei Napardi<\/b> (Fr. 10., 10:00) vereint die Peña mit den Gästen <b>Miguel Ángel, Luci<\/b> und <b>José María Sevilla<\/b> — 10 Personen. Ankunft besser 09:45.", "en": "The <b>Napardi breakfast<\/b> (Fri 10, 10:00) brings the Peña together with guests <b>Miguel Ángel, Luci<\/b> and <b>José María Sevilla<\/b> — 10 diners. Best to arrive at 09:45.", "ru": "<b>Завтрак в Napardi<\/b> (пт 10-го, 10:00) собирает Пенью с гостями <b>Мигель Анхель, Луси<\/b> и <b>Хосе Мария Севилья<\/b> — 10 человек. Лучше прийти к 09:45.", "ja": "<b>ナパルディの朝食<\/b>（金10日、10:00）は、ペーニャとゲストの<b>ミゲル・アンヘル、ルシ<\/b>、<b>ホセ・マリア・セビーリャ<\/b>の計10名が集います。09:45到着が望ましいです。"}, "cenas_note2": {"es": "Salvo Napardi (desayuno) y Kabo (comida, 13:45 el día 14), todas las reservas son a las <b>22:30<\/b>, después de la corrida.", "de": "Außer Napardi (Frühstück) und Kabo (Mittagessen, 13:45 am 14.) sind alle Reservierungen um <b>22:30<\/b>, nach der Corrida.", "en": "Apart from Napardi (breakfast) and Kabo (lunch, 13:45 on the 14th), every booking is at <b>22:30<\/b>, after the bullfight.", "ru": "Кроме Napardi (завтрак) и Kabo (обед, 13:45 14-го), все брони в <b>22:30<\/b>, после корриды.", "ja": "ナパルディ（朝食）とカボ（14日昼食、13:45）を除き、予約はすべて闘牛後の<b>22:30<\/b>です。"}, "plaza_title": {"es": "La plaza", "de": "Die Arena", "en": "The arena", "ru": "Арена", "ja": "闘牛場"}, "plaza_desc": {"es": "La <strong>Plaza de Toros de Pamplona<\/strong>, conocida como «La Misericordia» por la institución que la gestiona, es la segunda más grande del mundo por aforo. Es el destino del encierro matinal y el escenario de las corridas de la tarde.", "de": "Die <strong>Stierkampfarena von Pamplona<\/strong>, nach ihrer Trägerinstitution „La Misericordia“ genannt, ist gemessen an der Kapazität die zweitgrößte der Welt. Sie ist das Ziel des morgendlichen Encierro und Schauplatz der Nachmittags-Corridas.", "en": "The <strong>Pamplona Bullring<\/strong>, known as 'La Misericordia' after the institution that runs it, is the second largest in the world by capacity. It is the finish of the morning encierro and the stage for the afternoon bullfights.", "ru": "<strong>Арена Памплоны<\/strong>, известная как «La Misericordia» по управляющему ею учреждению, вторая в мире по вместимости. Это финиш утреннего энсьерро и сцена вечерних коррид.", "ja": "<strong>パンプローナ闘牛場<\/strong>は、運営する施設にちなみ「ラ・ミセリコルディア」と呼ばれ、収容人数で世界第2位です。朝の牛追い（エンシエロ）のゴールであり、午後の闘牛の舞台です。"}, "horarios": {"es": "Horarios", "de": "Zeiten", "en": "Schedule", "ru": "Расписание", "ja": "時間"}, "sch_apartado": {"es": "<b>Apartado / sorteo · 13:00<\/b> (apertura 12:15) — en los corrales de la plaza se emparejan y encierran los toros de la tarde.", "de": "<b>Apartado / Auslosung · 13:00<\/b> (Einlass 12:15) — in den Ställen werden die Stiere des Nachmittags gepaart und eingesperrt.", "en": "<b>Apartado / draw · 13:00<\/b> (doors 12:15) — the afternoon's bulls are paired and penned in the arena's corrals.", "ru": "<b>Апартадо / жеребьёвка · 13:00<\/b> (вход 12:15) — в загонах арены быков вечера разбивают на пары и запирают.", "ja": "<b>アパルタード／くじ引き · 13:00<\/b>（開場 12:15） — 闘牛場の囲いで、その日午後の牛を組み合わせて収容します。"}, "sch_corridas": {"es": "<b>Corridas · 18:30<\/b> — del 6 al 14 de julio.", "de": "<b>Corridas · 18:30<\/b> — 6. bis 14. Juli.", "en": "<b>Bullfights · 18:30<\/b> — 6 to 14 July.", "ru": "<b>Корриды · 18:30<\/b> — с 6 по 14 июля.", "ja": "<b>闘牛 · 18:30<\/b> — 7月6〜14日。"}, "sch_novillada": {"es": "<b>Novillada · 20:00<\/b> — el domingo 5 de julio, jornada del chupinazo.", "de": "<b>Novillada · 20:00<\/b> — Sonntag, 5. Juli, Tag des Chupinazo.", "en": "<b>Novillada · 20:00<\/b> — Sunday 5 July, chupinazo day.", "ru": "<b>Новильяда · 20:00<\/b> — воскресенье 5 июля, день чупинасо.", "ja": "<b>ノビヤーダ · 20:00<\/b> — 7月5日（日）、チュピナソの日。"}, "sch_encierro": {"es": "<b>Encierro · 08:00<\/b> — del 7 al 14 de julio, desde Santo Domingo hasta la plaza.", "de": "<b>Encierro · 08:00<\/b> — 7. bis 14. Juli, von Santo Domingo zur Arena.", "en": "<b>Encierro · 08:00<\/b> — 7 to 14 July, from Santo Domingo to the ring.", "ru": "<b>Энсьерро · 08:00<\/b> — с 7 по 14 июля, от Санто-Доминго до арены.", "ja": "<b>牛追い · 08:00<\/b> — 7月7〜14日、サント・ドミンゴから闘牛場まで。"}, "penya_title": {"es": "La Peña Borussia", "de": "Die Peña Borussia", "en": "The Peña Borussia", "ru": "Пенья Боруссия", "ja": "ペーニャ・ボルシア"}, "penya_about": {"de": "<p>Seit mehr als sechs Jahrzehnten repräsentiert die Peña Borussia Deutschland in Pamplona. Zwar sind die Fiesta de San Fermín und die Encierros auch in Deutschland durch Ernest Hemingway und die Fernsehbilder bekannt, doch ein tieferes Verständnis für die Tauromaquia blieb dort lange eine Seltenheit. Umso bemerkenswerter ist die Geschichte dieser Freunde aus Mönchengladbach, deren erste Reise nach Navarra zu einer lebenslangen Verbundenheit mit Pamplona wurde.<\/p>\n<p>Den Anfang machte der Chemiker Dr. Franz-Josef Padberg, ein großer Bewunderer Hemingways. Ende der 1950er-Jahre erlebte er erstmals die Sanfermines und berichtete anschließend in seiner Heimat mit solcher Begeisterung von Pamplona, dass seine Freunde Helmut Breuer, Wolfgang Felske, Helmut Schröder und Franz Breuer bald darauf mit ihm nach Navarra reisten.<\/p>\n<p>Die entscheidende Reise fand 1963 statt. In einem Fiat 500 fuhren die jungen Freunde durch den Süden Europas und wollten mit eigenen Augen sehen, ob Pamplona noch jenem Ort glich, den Hemingway fast vier Jahrzehnte zuvor in „Fiesta“ beschrieben hatte. Die Antwort war eindeutig: Die Stadt, ihre Menschen und die Feria zogen sie sofort in ihren Bann. Sie wurden, wie sie später sagten, vom „Blitz getroffen“ und entwickelten sich zu leidenschaftlichen Aficionados de toros.<\/p>\n<p>In einer langen Nacht auf der Terrasse des Café Iruña nahm ihre Gemeinschaft schließlich feste Gestalt an. Da die Freunde aus Mönchengladbach kamen, dessen Fußballclub Borussia mit Spielern wie Günter Netzer, Berti Vogts und Jupp Heynckes international bekannt war, lag der Name nahe: Sie nannten ihren Club Taurino stolz Peña Borussia.<\/p>\n<h4 class='pena-h'>Der Palco de Sobrepuerta<\/h4>\n<p>Die große Stunde der Peña schlug 1979. Inzwischen waren auch Günter Bonas und Achim Schoor zur Gruppe gestoßen. Ignacio Cía, der damalige Direktor der Casa de Misericordia und längst ein enger Freund der Deutschen, bot ihnen den Palco de Sobrepuerta mit seinen zehn Plätzen in der Plaza de Toros an.<\/p>\n<p>Dieser markante Balkon über dem Callejón war zuvor jahrzehntelang von einer Bankiersfamilie aus Sevilla abonniert worden. Nach den tragischen Unruhen während der Sanfermines 1978, die zum Abbruch der Fiesta führten, entschied sich die Familie, nicht mehr nach Pamplona zurückzukehren.<\/p>\n<p>Für die Peña Borussia war das Angebot eine außergewöhnliche Ehre. Ihr Präsident Helmut Breuer trug seinen Namen stellvertretend für die Freunde in das Abonnentenbuch der Casa de Misericordia ein und ergänzte den selbstbewussten Schwur: <i>„Por todos los tiempos.“<\/i><\/p>\n<p>Mit den zehn Abonos wuchs auch die Peña. Zu ihren neuen Mitgliedern gehörten der Privatbankier und Schatzmeister Dr. Gerhard Huber, sein Freund Dr. Peter Wein sowie Puri Recatalá aus Cádiz.<\/p>\n<h4 class='pena-h'>Eine über Generationen gewachsene Freundschaft<\/h4>\n<p>Im Laufe der Jahrzehnte musste die Peña von mehreren Gründern und Weggefährten Abschied nehmen. Dr. Franz-Josef Padberg verstarb früh. Helmut Schröder starb im Juli 2003, als sein Koffer für Pamplona bereits gepackt und der Flug gebucht war. Doch die übrigen Mitglieder setzten die Tradition fort und gaben ihre Begeisterung an die nächste Generation weiter.<\/p>\n<p>Jahr für Jahr legen die Freunde rund 1.700 Kilometer quer durch Europa zurück, um nach Pamplona zu gelangen. Dort nehmen sie auf ihren angestammten Plätzen der Sobrepuerta Platz und treffen jene Menschen und Institutionen wieder, die längst zu ihrer navarresischen Familie geworden sind: die Casa de Misericordia, die Sociedad Gastronómica Napardi und den Club Taurino de Pamplona.<\/p>\n<p>Die Stadt hat diese außergewöhnliche Treue mehrfach gewürdigt. Zum 50. Jubiläum im Jahr 2013 ernannte der Club Taurino de Pamplona die Peña Borussia zum Ehrenmitglied. 2023 feierte sie gemeinsam mit ihren Freunden in Pamplona ihr 60-jähriges Bestehen. Ein Jahr später ernannte die Peña Miguel Ángel Alústiza Zubiri zum Ehrenmitglied. Der Navarrese war jahrzehntelang für die sozialen und kulturellen Aktivitäten der Casa de Misericordia verantwortlich und vielen Sanfermineros als vertraute Stimme des Apartado bekannt.<\/p>\n<p>Auch zu Hause in Mönchengladbach wird die Afición gepflegt. Die Peña unterhält dort ein kleines taurines Museum und trifft sich jeden Monat zu einer Tertulia Taurina. Pamplona ist für ihre Mitglieder deshalb keine Erinnerung an eine jährliche Reise, sondern ein fester Bestandteil ihres Lebens.<\/p>\n<p>Wie tief diese Verbindung reicht, zeigte sich besonders 2020. Wegen der Pandemie mussten die Sanfermines ausfallen und die Peña konnte erstmals nicht nach Pamplona reisen. Daraufhin spendeten die Freunde der Casa de Misericordia den gesamten Betrag, den sie für ihre zehn Abonnements ausgegeben hätten: rund 5.830 Euro. Das Geld kam damit jener Institution und ihren Bewohnern zugute, mit der die Peña seit Jahrzehnten eng verbunden ist.<\/p>\n<p>Die Peña Borussia ist in Pamplona längst keine touristische Erscheinung mehr. Sie ist zu einer festen Institution und einer lebendigen Brücke zwischen dem Niederrhein und Navarra geworden. Der rote Pañuelo, die weißen Hemden und der Name Borussia stehen heute für mehr als sechs Jahrzehnte Afición, Gastfreundschaft und Freundschaft über alle Grenzen hinweg.<\/p>\n<blockquote class='pena-quote'>„Wir sehen schon lange mit größerer Klarheit als Hemingway, daß die Fiesta de San Fermin in Wahrheit una Fiesta de la Vida, ein Fest des Lebens ist. Die acht Tage des Heiligen Fermin sind für uns Nordeuropäer los unicos dias del anos con gaz – oder acht Tage in Champagnerlaune. In Pamplona lieben wir nicht nur die Stierkämpfe, sondern auch die großartigen Gerichte der Baskischen Küche, die Weine Navarras, die großen Herzen der Navarros, die Musik auf den Straßen bei Tag und bei Nacht und die überquellende Lebensfreude dieses auf der Welt einmaligen Festes, in dessen Mittelpunkt der toro bravo steht, der auch den Rhythmus jedes der vielen Feiertage vom 6. bis zum 14. Juli bestimmt.“<cite>— Helmut Breuer<\/cite><\/blockquote>", "es": "<p>Desde hace más de seis décadas, la Peña Borussia representa a Alemania en Pamplona. La Fiesta de San Fermín y los encierros también se conocen en Alemania por Ernest Hemingway y las imágenes de televisión, pero una comprensión más profunda de la tauromaquia siguió siendo allí, durante mucho tiempo, una rareza. Más notable resulta aún la historia de estos amigos de Mönchengladbach, cuyo primer viaje a Navarra se convirtió en un vínculo de por vida con Pamplona.<\/p>\n<p>Todo empezó con el químico Dr. Franz-Josef Padberg, gran admirador de Hemingway. A finales de los años cincuenta vivió por primera vez los Sanfermines y habló de Pamplona en su tierra con tal entusiasmo que sus amigos Helmut Breuer, Wolfgang Felske, Helmut Schröder y Franz Breuer no tardaron en viajar con él a Navarra.<\/p>\n<p>El viaje decisivo tuvo lugar en 1963. En un Fiat 500, los jóvenes amigos cruzaron el sur de Europa para ver con sus propios ojos si Pamplona seguía pareciéndose al lugar que Hemingway había descrito en «Fiesta» casi cuatro décadas antes. La respuesta fue rotunda: la ciudad, sus gentes y la feria los cautivaron de inmediato. Quedaron, como dirían después, «fulminados por un rayo», y se convirtieron en apasionados aficionados a los toros.<\/p>\n<p>En una larga noche en la terraza del Café Iruña, su comunidad tomó por fin forma definitiva. Como los amigos venían de Mönchengladbach —cuyo club de fútbol, el Borussia, era internacionalmente famoso con jugadores como Günter Netzer, Berti Vogts y Jupp Heynckes—, el nombre era evidente: llamaron con orgullo a su club taurino Peña Borussia.<\/p>\n<h4 class='pena-h'>El Palco de Sobrepuerta<\/h4>\n<p>La gran hora de la peña llegó en 1979. Para entonces se habían unido también Günter Bonas y Achim Schoor. Ignacio Cía, director de la Casa de Misericordia y desde hacía tiempo íntimo amigo de los alemanes, les ofreció el Palco de Sobrepuerta, con sus diez localidades en la Plaza de Toros.<\/p>\n<p>Aquel balcón singular sobre el callejón había estado abonado durante décadas por una familia de banqueros de Sevilla. Tras los trágicos disturbios de los Sanfermines de 1978, que obligaron a suspender la fiesta, la familia decidió no volver a Pamplona.<\/p>\n<p>Para la Peña Borussia, la oferta fue un honor extraordinario. Su presidente, Helmut Breuer, inscribió su nombre en representación de los amigos en el libro de abonados de la Casa de Misericordia y añadió el juramento, lleno de aplomo: <i>«Por todos los tiempos.»<\/i><\/p>\n<p>Con los diez abonos creció también la peña. Entre sus nuevos miembros estaban el banquero privado y tesorero Dr. Gerhard Huber, su amigo Dr. Peter Wein y Puri Recatalá, de Cádiz.<\/p>\n<h4 class='pena-h'>Una amistad crecida a lo largo de generaciones<\/h4>\n<p>Con los decenios, la peña tuvo que despedir a varios fundadores y compañeros. El Dr. Franz-Josef Padberg falleció pronto. Helmut Schröder murió en julio de 2003, cuando su maleta para Pamplona ya estaba hecha y el vuelo reservado. Pero los demás miembros mantuvieron la tradición y transmitieron su entusiasmo a la siguiente generación.<\/p>\n<p>Año tras año, los amigos recorren unos 1.700 kilómetros a través de Europa para llegar a Pamplona. Allí ocupan sus localidades de siempre en la Sobrepuerta y reencuentran a las personas e instituciones que hace tiempo son ya su familia navarra: la Casa de Misericordia, la Sociedad Gastronómica Napardi y el Club Taurino de Pamplona.<\/p>\n<p>La ciudad ha sabido honrar esta fidelidad excepcional en más de una ocasión. Para el 50.º aniversario, en 2013, el Club Taurino de Pamplona nombró socia de honor a la Peña Borussia. En 2023 celebró con sus amigos en Pamplona su 60.º aniversario. Un año después, la peña nombró socio de honor a Miguel Ángel Alústiza Zubiri, el navarro que durante décadas se ocupó de las actividades sociales y culturales de la Casa de Misericordia y a quien muchos sanfermineros conocían como la voz familiar del apartado.<\/p>\n<p>También en casa, en Mönchengladbach, se cultiva la afición. Allí la peña mantiene un pequeño museo taurino y se reúne cada mes en una tertulia taurina. Por eso, para sus miembros, Pamplona no es el recuerdo de un viaje anual, sino parte fija de su vida.<\/p>\n<p>Hasta qué punto llega este vínculo se vio sobre todo en 2020. A causa de la pandemia, los Sanfermines se suspendieron y la peña no pudo viajar por primera vez a Pamplona. Entonces los amigos donaron a la Casa de Misericordia la cantidad íntegra que habrían gastado en sus diez abonos: unos 5.830 euros, en beneficio de aquella institución y sus residentes, a los que la peña está unida desde hace décadas.<\/p>\n<p>La Peña Borussia hace tiempo que dejó de ser, en Pamplona, un fenómeno turístico. Se ha convertido en una institución consolidada y en un puente vivo entre el Bajo Rin y Navarra. El pañuelo rojo, las camisas blancas y el nombre Borussia representan hoy más de seis décadas de afición, hospitalidad y amistad por encima de todas las fronteras.<\/p>\n<blockquote class='pena-quote'>«Desde hace mucho vemos, con mayor claridad que Hemingway, que la Fiesta de San Fermín es en verdad una Fiesta de la Vida. Para los noreuropeos, los ocho días de San Fermín son los únicos días del año con gas, u ocho días de humor de champán. En Pamplona no solo amamos las corridas, sino también los grandes platos de la cocina vasca, los vinos de Navarra, el gran corazón de los navarros, la música en las calles de día y de noche y la desbordante alegría de vivir de esta fiesta única en el mundo, en cuyo centro está el toro bravo, que marca también el ritmo de cada una de las muchas jornadas del 6 al 14 de julio.»<cite>— Helmut Breuer<\/cite><\/blockquote>", "en": "<p>For more than six decades, Peña Borussia has represented Germany in Pamplona. The Fiesta de San Fermín and the encierros are known in Germany too, through Ernest Hemingway and television images, yet a deeper understanding of the tauromaquia long remained rare there. All the more remarkable is the story of these friends from Mönchengladbach, whose first journey to Navarre became a lifelong bond with Pamplona.<\/p>\n<p>It began with the chemist Dr. Franz-Josef Padberg, a great admirer of Hemingway. In the late 1950s he experienced the Sanfermines for the first time and spoke of Pamplona back home with such enthusiasm that his friends Helmut Breuer, Wolfgang Felske, Helmut Schröder and Franz Breuer soon travelled with him to Navarre.<\/p>\n<p>The decisive trip took place in 1963. In a Fiat 500 the young friends drove across southern Europe to see with their own eyes whether Pamplona still resembled the place Hemingway had described in “Fiesta” almost four decades earlier. The answer was unequivocal: the city, its people and the feria captivated them at once. They were, as they later said, “struck by lightning”, and became passionate aficionados de toros.<\/p>\n<p>On a long night on the terrace of the Café Iruña their fellowship finally took firm shape. As the friends came from Mönchengladbach — whose football club Borussia was internationally famous with players like Günter Netzer, Berti Vogts and Jupp Heynckes — the name was obvious: they proudly called their club taurino Peña Borussia.<\/p>\n<h4 class='pena-h'>The Palco de Sobrepuerta<\/h4>\n<p>The peña's great hour came in 1979. By then Günter Bonas and Achim Schoor had joined the group. Ignacio Cía, director of the Casa de Misericordia and long a close friend of the Germans, offered them the Palco de Sobrepuerta, with its ten seats in the Plaza de Toros.<\/p>\n<p>This striking balcony above the callejón had been subscribed for decades by a banking family from Seville. After the tragic unrest during the 1978 Sanfermines, which forced the fiesta to be suspended, the family decided not to return to Pamplona.<\/p>\n<p>For Peña Borussia the offer was an extraordinary honour. Their president Helmut Breuer entered his name, on behalf of the friends, in the subscribers' book of the Casa de Misericordia and added the proud vow: <i>“Por todos los tiempos.”<\/i><\/p>\n<p>With the ten abonos the peña grew too. Its new members included the private banker and treasurer Dr. Gerhard Huber, his friend Dr. Peter Wein, and Puri Recatalá from Cádiz.<\/p>\n<h4 class='pena-h'>A friendship grown across generations<\/h4>\n<p>Over the decades the peña had to bid farewell to several founders and companions. Dr. Franz-Josef Padberg died early. Helmut Schröder died in July 2003, when his suitcase for Pamplona was already packed and his flight booked. Yet the remaining members carried on the tradition and passed their passion to the next generation.<\/p>\n<p>Year after year the friends travel some 1,700 kilometres across Europe to reach Pamplona. There they take their accustomed seats in the Sobrepuerta and meet again the people and institutions that have long become their Navarrese family: the Casa de Misericordia, the Sociedad Gastronómica Napardi and the Club Taurino de Pamplona.<\/p>\n<p>The city has honoured this exceptional loyalty more than once. For the 50th anniversary in 2013, the Club Taurino de Pamplona named Peña Borussia an honorary member. In 2023 it celebrated its 60th anniversary with its friends in Pamplona. A year later the peña named Miguel Ángel Alústiza Zubiri an honorary member — the Navarrese who for decades oversaw the social and cultural activities of the Casa de Misericordia and was known to many Sanfermineros as the familiar voice of the apartado.<\/p>\n<p>The afición is cultivated at home in Mönchengladbach too, where the peña keeps a small taurine museum and meets every month for a Tertulia Taurina. For its members, Pamplona is therefore not the memory of an annual trip but a fixed part of their lives.<\/p>\n<p>How deep this bond runs became especially clear in 2020. Because of the pandemic the Sanfermines were cancelled and the peña could not travel to Pamplona for the first time. The friends then donated to the Casa de Misericordia the entire sum they would have spent on their ten subscriptions: around €5,830 — for the institution and its residents to whom the peña has been closely bound for decades.<\/p>\n<p>Peña Borussia is long no tourist phenomenon in Pamplona. It has become a firm institution and a living bridge between the Lower Rhine and Navarre. The red pañuelo, the white shirts and the name Borussia today stand for more than six decades of afición, hospitality and friendship across every border.<\/p>\n<blockquote class='pena-quote'>“We have long seen, with greater clarity than Hemingway, that the Fiesta de San Fermín is in truth una Fiesta de la Vida, a celebration of life. For us northern Europeans the eight days of Saint Fermín are los únicos días del año con gas — eight days in a champagne mood. In Pamplona we love not only the bullfights but also the great dishes of Basque cuisine, the wines of Navarre, the big hearts of the Navarros, the music in the streets by day and by night, and the overflowing joie de vivre of this festival unique in the world, at whose centre stands the toro bravo, which also sets the rhythm of every one of the many feast days from 6 to 14 July.”<cite>— Helmut Breuer<\/cite><\/blockquote>", "ru": "<p>Уже более шести десятилетий Пенья Боруссия представляет Германию в Памплоне. Фиеста Сан-Фермина и энсьерро известны в Германии благодаря Эрнесту Хемингуэю и телевизионным кадрам, однако более глубокое понимание тавромахии долго оставалось там редкостью. Тем примечательнее история этих друзей из Мёнхенгладбаха, чья первая поездка в Наварру переросла в пожизненную связь с Памплоной.<\/p>\n<p>Всё началось с химика д-ра Франца-Йозефа Падберга, большого почитателя Хемингуэя. В конце 1950-х он впервые пережил Сан-Фермин и рассказывал о Памплоне дома с таким воодушевлением, что его друзья Хельмут Бройер, Вольфганг Фельске, Хельмут Шрёдер и Франц Бройер вскоре отправились с ним в Наварру.<\/p>\n<p>Решающая поездка состоялась в 1963 году. На «Фиате-500» молодые друзья проехали через юг Европы, чтобы своими глазами увидеть, похожа ли ещё Памплона на то место, которое Хемингуэй описал в «Фиесте» почти четырьмя десятилетиями ранее. Ответ был однозначным: город, его люди и феерия покорили их сразу. Их, как они потом говорили, «сразило молнией», и они стали страстными любителями корриды.<\/p>\n<p>Долгой ночью на террасе Café Iruña их содружество наконец обрело прочную форму. Поскольку друзья были из Мёнхенгладбаха, чей футбольный клуб «Боруссия» был всемирно известен игроками вроде Гюнтера Нетцера, Берти Фогтса и Юппа Хайнкеса, имя напрашивалось само: они с гордостью назвали свой club taurino Пенья Боруссия.<\/p>\n<h4 class='pena-h'>Палько-де-Собрепуэрта<\/h4>\n<p>Звёздный час пеньи пробил в 1979 году. К тому времени к группе присоединились Гюнтер Бонас и Ахим Шор. Игнасио Сиа, директор Casa de Misericordia и давний близкий друг немцев, предложил им Палько-де-Собрепуэрта с десятью местами на Пласа-де-Торос.<\/p>\n<p>Этот приметный балкон над кальехоном десятилетиями был абонирован банкирской семьёй из Севильи. После трагических беспорядков на Сан-Фермине 1978 года, приведших к остановке фиесты, семья решила больше не возвращаться в Памплону.<\/p>\n<p>Для Пеньи Боруссия это предложение стало исключительной честью. Её президент Хельмут Бройер вписал своё имя от лица друзей в книгу абонентов Casa de Misericordia и добавил уверенную клятву: <i>«Por todos los tiempos» («На все времена»).<\/i><\/p>\n<p>С десятью абоно росла и пенья. Среди новых членов были частный банкир и казначей д-р Герхард Хубер, его друг д-р Петер Вайн и Пури Рекатала из Кадиса.<\/p>\n<h4 class='pena-h'>Дружба, выросшая через поколения<\/h4>\n<p>За десятилетия пенье пришлось проститься с несколькими основателями и спутниками. Д-р Франц-Йозеф Падберг ушёл рано. Хельмут Шрёдер умер в июле 2003 года, когда чемодан в Памплону был уже собран, а рейс забронирован. Но остальные члены продолжили традицию и передали свою страсть следующему поколению.<\/p>\n<p>Год за годом друзья преодолевают около 1700 километров через Европу, чтобы добраться до Памплоны. Там они занимают свои привычные места на Собрепуэрте и вновь встречают людей и учреждения, давно ставшие их наваррской семьёй: Casa de Misericordia, гастрономическое общество Napardi и Club Taurino de Pamplona.<\/p>\n<p>Город не раз отмечал эту исключительную верность. К 50-летию в 2013 году Club Taurino de Pamplona назвал Пенью Боруссия почётным членом. В 2023-м она отпраздновала с друзьями в Памплоне своё 60-летие. Год спустя пенья назвала почётным членом Мигеля Анхеля Алустису Субири — наваррца, который десятилетиями вёл социальную и культурную деятельность Casa de Misericordia и был знаком многим сан-ферминерос как привычный голос апартадо.<\/p>\n<p>Афисьон лелеют и дома, в Мёнхенгладбахе, где пенья держит небольшой музей корриды и каждый месяц собирается на таурино-тертулию. Поэтому для её членов Памплона — не воспоминание о ежегодной поездке, а неотъемлемая часть жизни.<\/p>\n<p>Насколько глубока эта связь, особенно ясно стало в 2020 году. Из-за пандемии Сан-Фермин отменили, и пенья впервые не смогла приехать в Памплону. Тогда друзья пожертвовали Casa de Misericordia всю сумму, которую потратили бы на десять абонементов, — около 5830 евро, в пользу того учреждения и его подопечных, с которыми пенья связана десятилетиями.<\/p>\n<p>Пенья Боруссия давно уже не туристическое явление в Памплоне. Она стала прочным институтом и живым мостом между Нижним Рейном и Наваррой. Красный паньуэло, белые рубашки и имя «Боруссия» сегодня олицетворяют более шести десятилетий афисьона, гостеприимства и дружбы поверх всех границ.<\/p>\n<blockquote class='pena-quote'>«Мы уже давно видим, яснее Хемингуэя, что Фиеста Сан-Фермина — это поистине una Fiesta de la Vida, праздник жизни. Для нас, северных европейцев, восемь дней Святого Фермина — это los únicos días del año con gas, восемь дней в шампанском настроении. В Памплоне мы любим не только корриду, но и великолепные блюда баскской кухни, вина Наварры, большие сердца наваррцев, музыку на улицах днём и ночью и переполняющую радость жизни этого единственного в мире праздника, в центре которого стоит toro bravo, задающий ритм каждому из множества праздничных дней с 6 по 14 июля».<cite>— Хельмут Бройер<\/cite><\/blockquote>", "ja": "<p>60年以上にわたり、ペーニャ・ボルシアはパンプローナでドイツを代表してきました。サン・フェルミン祭と牛追い（エンシエロ）は、アーネスト・ヘミングウェイやテレビ映像を通じてドイツでも知られていますが、闘牛（タウロマキア）への深い理解は長らく稀でした。それだけに、メンヒェングラートバッハの友人たちの物語は際立っています。彼らの最初のナバラ行きは、生涯にわたるパンプローナとの絆になりました。<\/p>\n<p>始まりは、ヘミングウェイの大の愛読者だった化学者フランツ＝ヨーゼフ・パドベルク博士でした。1950年代末に初めてサン・フェルミンを体験し、故郷で熱く語ったため、友人のヘルムート・ブロイヤー、ヴォルフガング・フェルスケ、ヘルムート・シュレーダー、フランツ・ブロイヤーも程なく彼とナバラへ旅立ちました。<\/p>\n<p>決定的な旅は1963年でした。フィアット500で南欧を走り抜けた若者たちは、ヘミングウェイが約40年前に『日はまた昇る（フィエスタ）』で描いた街と今も変わらないかを、自分の目で確かめようとしました。答えは明白でした。街も人々もフェリアも、たちまち彼らを虜にしました。後に彼らが語ったように「雷に打たれた」ようになり、熱烈な闘牛愛好家（アフィシオナード）となったのです。<\/p>\n<p>カフェ・イルーニャのテラスでの長い夜に、その仲間意識はついに確かな形を得ました。友人たちはメンヒェングラートバッハの出身で、その街のサッカークラブ「ボルシア」はギュンター・ネッツァー、ベルティ・フォクツ、ユップ・ハインケスらで世界的に有名でした。名前は自ずと決まり、彼らは誇りを込めて自分たちの闘牛クラブをペーニャ・ボルシアと名づけました。<\/p>\n<h4 class='pena-h'>パルコ・デ・ソブレプエルタ<\/h4>\n<p>ペーニャの大きな時は1979年に訪れました。その頃にはギュンター・ボナスとアヒム・シュオールも加わっていました。カサ・デ・ミセリコルディアの館長で、かねてよりドイツ人たちと親しかったイグナシオ・シアが、闘牛場の10席を擁するパルコ・デ・ソブレプエルタを彼らに提供しました。<\/p>\n<p>カジェホンを見下ろすこの目を引く桟敷は、それまで数十年、セビーリャの銀行家一族が予約していました。フィエスタの中断を招いた1978年サン・フェルミンの悲劇的な騒乱の後、その一族はパンプローナへ戻らないと決めたのです。<\/p>\n<p>ペーニャ・ボルシアにとって、この申し出は格別の名誉でした。会長ヘルムート・ブロイヤーは友人たちを代表してカサ・デ・ミセリコルディアの会員名簿に署名し、誇り高い誓いを書き添えました——<i>「Por todos los tiempos（とこしえに）」。<\/i><\/p>\n<p>10口の通し券とともにペーニャも大きくなりました。新会員には、プライベートバンカーで会計係のゲルハルト・フーバー博士、その友人ペーター・ヴァイン博士、そしてカディス出身のプリ・レカタラがいました。<\/p>\n<h4 class='pena-h'>世代を超えて育まれた友情<\/h4>\n<p>数十年の間に、ペーニャは何人もの創設者や同志を見送らねばなりませんでした。フランツ＝ヨーゼフ・パドベルク博士は早くに世を去りました。ヘルムート・シュレーダーは2003年7月、パンプローナ行きの荷造りを終え航空券も予約済みの折に亡くなりました。それでも残る会員たちは伝統を受け継ぎ、その情熱を次の世代へ引き継ぎました。<\/p>\n<p>友人たちは毎年、パンプローナへたどり着くために欧州を約1,700キロ横断します。そして馴染みのソブレプエルタの席に着き、とうに彼らのナバラの家族となった人々や団体——カサ・デ・ミセリコルディア、美食協会ナパルディ、クラブ・タウリノ・デ・パンプローナ——と再会します。<\/p>\n<p>街はこの並外れた忠誠を幾度も称えてきました。2013年の50周年には、クラブ・タウリノ・デ・パンプローナがペーニャ・ボルシアを名誉会員に。2023年にはパンプローナの友人たちと60周年を祝いました。翌年、ペーニャはミゲル・アンヘル・アルスティサ・スビリを名誉会員に迎えました。数十年にわたりカサ・デ・ミセリコルディアの社会・文化活動を担い、多くのサンフェルミネーロにアパルタードの聞き慣れた声として知られたナバラ人です。<\/p>\n<p>アフィシオンは故郷メンヒェングラートバッハでも育まれています。ペーニャはそこで小さな闘牛博物館を運営し、毎月「闘牛談義（テルトゥリア・タウリナ）」に集います。会員にとってパンプローナは、年に一度の旅の思い出ではなく、人生に欠かせない一部なのです。<\/p>\n<p>この絆の深さは、とりわけ2020年に表れました。パンデミックでサン・フェルミンは中止となり、ペーニャは初めてパンプローナへ行けませんでした。そこで友人たちは、10口の通し券に費やすはずだった全額——約5,830ユーロ——を、数十年来固く結ばれてきたカサ・デ・ミセリコルディアとその入居者のために寄付しました。<\/p>\n<p>ペーニャ・ボルシアは、もはやパンプローナで観光客の存在ではありません。揺るぎない団体となり、ニーダーライン（下ライン地方）とナバラを結ぶ生きた架け橋となりました。赤いパニュエロ、白いシャツ、そして「ボルシア」の名は今日、60年余りのアフィシオン、もてなし、そしてあらゆる国境を越えた友情を象徴しています。<\/p>\n<blockquote class='pena-quote'>「私たちはずっと前から、ヘミングウェイ以上に明確に分かっています——サン・フェルミン祭とは、まことに una Fiesta de la Vida、すなわち生命の祝祭なのだと。私たち北欧人にとって、聖フェルミンの八日間は los únicos días del año con gas、シャンパンのように心躍る八日間です。パンプローナで私たちが愛するのは闘牛だけではありません。バスク料理の素晴らしい品々、ナバラのワイン、ナバラ人の大きな心、昼も夜も街に流れる音楽、そして世界に類のないこの祭りのあふれる生きる喜び——その中心には闘牛（toro bravo）がいて、7月6日から14日までの幾多の祝祭日それぞれのリズムをも定めているのです。」<cite>— ヘルムート・ブロイヤー<\/cite><\/blockquote>"}, "dl_today": {"es": "Hoy", "de": "Heute", "en": "Today", "ru": "Сегодня", "ja": "今日"}, "dl_countdown": {"es": "Faltan {n} días para la feria", "de": "Noch {n} Tage bis zur Feria", "en": "{n} days to the feria", "ru": "До ферии: {n} дн.", "ja": "フェリアまであと{n}日"}, "dl_after": {"es": "¡Pobre de mí! · hasta 2027", "de": "¡Pobre de mí! · bis 2027", "en": "¡Pobre de mí! · until 2027", "ru": "¡Pobre de mí! · до 2027", "ja": "¡Pobre de mí! · 2027年まで"}, "dl_default": {"es": "Tendido 1 · Sobrepuerta", "de": "Tendido 1 · Sobrepuerta", "en": "Tendido 1 · Sobrepuerta", "ru": "Тендидо 1 · Sobrepuerta", "ja": "テンディード1 · Sobrepuerta"}, "penya_tagline": {"es": "Una declaración de amor alemana a Pamplona", "de": "Eine deutsche Liebeserklärung an Pamplona", "en": "A German love letter to Pamplona", "ru": "Немецкое признание в любви Памплоне", "ja": "ドイツからパンプローナへ捧げる愛の便り"}, "exc_title": {"es": "Excursión · Exposición Carlos Ciriza", "de": "Ausflug · Ausstellung Carlos Ciriza", "en": "Excursion · Carlos Ciriza exhibition", "ru": "Экскурсия · выставка Карлоса Сиризы", "ja": "遠足 · カルロス・シリサ展"}, "exc_when": {"es": "Mediodía · sábado", "de": "Mittags · Samstag", "en": "Midday · Saturday", "ru": "Полдень · суббота", "ja": "昼 · 土曜"}, "exc_show": {"es": "«Vacío Habitado · Tiempo en Calma» · pintura y escultura", "de": "„Vacío Habitado · Tiempo en Calma“ · Malerei und Skulptur", "en": "“Vacío Habitado · Tiempo en Calma” · painting and sculpture", "ru": "«Vacío Habitado · Tiempo en Calma» · живопись и скульптура", "ja": "「Vacío Habitado · Tiempo en Calma」 · 絵画と彫刻"}, "exc_desc": {"es": "Nuestro amigo Carlos Ciriza invita a la Peña a su exposición en el histórico <b>Señorío de Elío<\/b> (Valle de Echauri), a 15 min de Pamplona. Un plan de mediodía: ver la muestra y picar unos pintxos con vino o cerveza en el pueblo. El sábado es buena fecha, con Pamplona a tope el fin de semana.", "de": "Unser Freund Carlos Ciriza lädt die Peña zu seiner Ausstellung im historischen <b>Señorío de Elío<\/b> (Valle de Echauri) ein, 15 Min. von Pamplona. Ein Mittagsplan: die Schau ansehen und im Dorf ein paar Pintxos bei Wein oder Bier picken. Der Samstag passt gut, wenn Pamplona am Wochenende überfüllt ist.", "en": "Our friend Carlos Ciriza invites the Peña to his exhibition at the historic <b>Señorío de Elío<\/b> (Echauri valley), 15 min from Pamplona. A midday plan: see the show and grab some pintxos with wine or beer in the village. Saturday suits well, with Pamplona packed at the weekend.", "ru": "Наш друг Карлос Сириза приглашает Пенью на свою выставку в историческом <b>Señorío de Elío<\/b> (долина Эчаури), в 15 мин от Памплоны. План на полдень: осмотреть экспозицию и перекусить пинчос с вином или пивом в деревне. Суббота удобна — в выходные Памплона переполнена.", "ja": "友人カルロス・シリサが、歴史ある<b>エリオ荘（Señorío de Elío）<\/b>（エチャウリ渓谷、パンプローナから15分）での展覧会にペーニャを招待しています。昼のプラン：作品を鑑賞し、村でワインやビールとともにピンチョスをつまむ。週末はパンプローナが混み合うため、土曜が好適です。"}, "exc_transport": {"es": "Carlos pone dos coches con conductor para llevar y traer al grupo (Pamplona ⇄ Elío).", "de": "Carlos stellt zwei Fahrzeuge mit Fahrer für Hin- und Rückfahrt (Pamplona ⇄ Elío).", "en": "Carlos provides two cars with driver for the round trip (Pamplona ⇄ Elío).", "ru": "Карлос предоставляет два автомобиля с водителем туда и обратно (Памплона ⇄ Элио).", "ja": "カルロスが送迎用に運転手付きの車を2台用意します（パンプローナ ⇄ エリオ）。"}, "exc_dates": {"es": "19 jun – 19 jul 2026", "de": "19. Juni – 19. Juli 2026", "en": "19 Jun – 19 Jul 2026", "ru": "19 июн – 19 июл 2026", "ja": "2026年6月19日〜7月19日"}, "exc_place": {"es": "Señorío de Elío · Valle de Echauri (Navarra)", "de": "Señorío de Elío · Valle de Echauri (Navarra)", "en": "Señorío de Elío · Echauri valley (Navarre)", "ru": "Señorío de Elío · долина Эчаури (Наварра)", "ja": "エリオ荘 · エチャウリ渓谷（ナバラ）"}, "exc_contact_lbl": {"es": "Reservar con Carlos", "de": "Bei Carlos anmelden", "en": "Book with Carlos", "ru": "Записаться у Карлоса", "ja": "カルロスへ連絡"}};
Object.assign(I18N,{"press_label": {"es": "En la prensa", "de": "In der Presse", "en": "In the press", "ru": "В прессе", "ja": "報道より"}, "press_date": {"es": "4 jul 2026", "de": "4. Juli 2026", "en": "4 Jul 2026", "ru": "4 июл 2026", "ja": "2026年7月4日"}, "press_cta": {"es": "Leer el artículo", "de": "Zum Artikel", "en": "Read the article", "ru": "Читать статью", "ja": "記事を読む"}, "press_summary": {"es": "Navarra.com dedica un reportaje a la Peña Borussia: cómo en 1963 tres jóvenes alemanes condujeron un Fiat 500 desde Mönchengladbach hasta Pamplona —unas 14 horas de carretera— siguiendo la «Fiesta» de Hemingway, y cómo aquel viaje dio origen a más de seis décadas de fidelidad a San Fermín y a su localidad de la Sobrepuerta del Tendido 1.", "de": "Navarra.com widmet der Peña Borussia eine Reportage: wie 1963 drei junge Deutsche in einem Fiat 500 von Mönchengladbach nach Pamplona fuhren – rund 14 Stunden – auf den Spuren von Hemingways „Fiesta“, und wie aus dieser Reise über sechs Jahrzehnte Treue zu San Fermín und zum Platz an der Sobrepuerta im Tendido 1 wurden.", "en": "Navarra.com runs a feature on the Peña Borussia: how in 1963 three young Germans drove a Fiat 500 from Mönchengladbach to Pamplona — some 14 hours on the road — following Hemingway's “Fiesta”, and how that trip grew into more than six decades of loyalty to San Fermín and their seats in the Sobrepuerta of Tendido 1.", "ru": "Navarra.com посвящает репортаж Пенье Боруссия: как в 1963 году трое молодых немцев проехали на «Фиате-500» из Мёнхенгладбаха в Памплону — около 14 часов в пути — по следам «Фиесты» Хемингуэя, и как эта поездка переросла в более чем шесть десятилетий верности Сан-Фермину и местам на Собрепуэрте в Тендидо 1.", "ja": "Navarra.com がペーニャ・ボルシアを特集。1963年、3人の若きドイツ人がヘミングウェイの『日はまた昇る（フィエスタ）』を追い、フィアット500でメンヒェングラートバッハからパンプローナまで約14時間走った旅が、いかにしてサンフェルミンとテンディード1のソブレプエルタの席への60年以上の忠誠へと育ったかを描きます。"}});
Object.assign(I18N,{"exc_hours": {"es": "Abierto de 11:00 a 18:00, todos los días (domingos y festivos incluidos), hasta el 18 de julio.", "de": "Geöffnet 11:00–18:00 Uhr, täglich (auch sonn- und feiertags), bis zum 18. Juli.", "en": "Open 11:00–18:00 daily (Sundays and holidays included), until 18 July.", "ru": "Открыто с 11:00 до 18:00 ежедневно (включая воскресенья и праздники), до 18 июля.", "ja": "開館 11:00〜18:00、毎日（日曜・祝日含む）、7月18日まで。"}, "exc_venue": {"es": "La muestra ocupa salas y galerías del Palacio de Elío, señorío de casi ocho siglos entre Etxauri y Ciriza, hoy recuperado como «Elío + Galería».", "de": "Die Schau bespielt Säle und Galerien des Palastes von Elío, eines fast achthundertjährigen Herrensitzes zwischen Etxauri und Ciriza, heute als „Elío + Galería“ wiederbelebt.", "en": "The show fills halls and galleries of the Palace of Elío, an almost 800-year-old manor between Etxauri and Ciriza, now revived as “Elío + Galería”.", "ru": "Экспозиция занимает залы и галереи дворца Элио — усадьбы почти восьмивековой истории между Эчаури и Сиризой, ныне возрождённой как «Elío + Galería».", "ja": "作品は、エチャウリとシリサの間にある約800年の歴史を持つエリオ宮殿の広間やギャラリーに展示されます。宮殿は現在「Elío + Galería」として再生されています。"}});
